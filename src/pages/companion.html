<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATALIAN · Companion</title>
  <link rel="icon" href="/AtalianFavicon.png" />
  <style>
    :root{
      --bg:#ece8e3; --phone:#fdfcfa; --surface:#ffffff; --surface-2:#f5f1ec;
      --ink:#24313f; --ink-soft:#5c6672; --ink-faint:#95a1ac;
      --line:#e6e1da; --line-2:#efeae3;
      --accent:#ee7e00; --accent-2:#c26600; --accent-bg:#fdecd6;
      --good:#2f8f4e; --good-bg:#e6f2e9; --warn:#b47a12; --warn-bg:#f8eed6; --crit:#c0392b; --crit-bg:#f7e2de;
      --shadow:0 1px 2px rgba(36,49,63,.05),0 10px 30px rgba(36,49,63,.11);
      --shadow-sm:0 1px 2px rgba(36,49,63,.07);
      --r:16px; --r-sm:11px;
      --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    }
    @media (prefers-color-scheme:dark){:root{
      --bg:#161e26; --phone:#24313f; --surface:#2b3947; --surface-2:#334352;
      --ink:#eef2f6; --ink-soft:#aab4bf; --ink-faint:#71808d; --line:#3a4a58; --line-2:#32414e;
      --accent:#ff9a2e; --accent-2:#ffb257; --accent-bg:#3a2b16;
      --good:#4fae63; --good-bg:#1e3226; --warn:#dda94a; --warn-bg:#332a15; --crit:#e06b58; --crit-bg:#3a2320;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 14px 40px rgba(0,0,0,.5); --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    }}
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
    .screen{max-width:400px;margin:0 auto;padding:18px 15px 40px;display:flex;flex-direction:column;gap:12px}

    .topbar{display:flex;align-items:center;gap:10px;padding:2px 4px}
    .brand{display:flex;align-items:center;gap:8px}
    .brand .mark{width:24px;height:24px;flex:0 0 auto}
    .brand-txt{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;display:flex;flex-direction:column;line-height:1.1;gap:1px}
    .brand-txt .site{font-size:14px;letter-spacing:-.01em;text-transform:none;color:var(--accent);font-weight:800}
    .seg.lang{margin-left:auto;display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow-sm)}
    .seg.lang a{cursor:pointer;font-size:12px;font-weight:600;color:var(--ink-soft);padding:5px 10px;border-radius:999px;text-decoration:none}
    .seg.lang a.on{background:var(--surface-2);color:var(--accent-2)}

    .hero{padding:2px 4px 0}
    .hero .kicker{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
    .hero h2{margin:.15em 0 .12em;font-size:27px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
    .hero h2 .sub{font-size:13px;font-weight:500;color:var(--ink-soft);letter-spacing:0}
    .hero .note{font-size:11.5px;color:var(--ink-soft)}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
    .card-h{display:flex;align-items:center;gap:10px;padding:13px 15px}
    .card-h .ic{width:20px;height:20px;flex:0 0 auto;color:var(--accent)}
    .card-h h3{margin:0;font-size:14px;letter-spacing:-.01em}
    .card-h .meta{margin-left:auto;font-size:11px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
    .card-b{padding:0 15px 15px}
    .loading{display:flex;align-items:center;gap:9px;color:var(--ink-faint);font-size:12.5px;padding:4px 0}
    .muted{color:var(--ink-soft);font-size:12.5px;padding:4px 0}

    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:2px}
    .metric{background:var(--surface-2);border-radius:var(--r-sm);padding:11px 8px;text-align:center}
    .metric .n{font-size:22px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
    .metric .n .u{font-size:11px;color:var(--ink-faint);font-weight:600;margin-left:1px}
    .metric .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px;font-weight:600}
    .verdict{display:flex;align-items:center;gap:9px;margin-top:12px;padding:10px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:600}
    .verdict.good{background:var(--good-bg);color:var(--good)} .verdict.warn{background:var(--warn-bg);color:var(--warn)} .verdict.crit{background:var(--crit-bg);color:var(--crit)}
    .verdict .vi{width:18px;height:18px;flex:0 0 auto}
    .gauge{height:6px;border-radius:99px;background:var(--line-2);margin-top:11px;overflow:hidden;position:relative}
    .gauge i{position:absolute;inset:0 auto 0 0;border-radius:99px;transition:width .5s ease,background .3s}
    .gauge-cap{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-faint);margin-top:5px}
    .advies{margin-top:11px;display:flex;flex-direction:column;gap:7px}
    .adv{display:flex;gap:8px;align-items:flex-start;font-size:12px;line-height:1.4;padding:9px 11px;border-radius:var(--r-sm);font-weight:600}
    .adv>span:first-child{flex:0 0 auto}
    .adv-good{background:var(--good-bg);color:var(--good)}
    .adv-warn{background:var(--warn-bg);color:var(--warn)}
    .adv-crit{background:var(--crit-bg);color:var(--crit)}
    .drukte{display:flex;align-items:center;gap:12px;margin-top:2px}
    .druk-bars{display:flex;gap:4px;flex:0 0 auto}
    .druk-bars b{width:16px;height:22px;border-radius:4px;background:var(--line-2)}
    .druk-bars b.on{background:var(--accent)}
    .druk-bars.good b.on{background:var(--good)} .druk-bars.warn b.on{background:var(--warn)} .druk-bars.crit b.on{background:var(--crit)}
    .druk-txt b{font-size:14px;display:block;letter-spacing:-.01em}
    .druk-txt span{font-size:11.5px;color:var(--ink-soft)}
    .eco{border-radius:var(--r);padding:13px 15px;display:flex;gap:12px;align-items:flex-start;border:1px solid transparent}
    .eco.good{background:var(--good-bg);border-color:color-mix(in srgb,var(--good) 22%,transparent)}
    .eco.warn{background:var(--warn-bg);border-color:color-mix(in srgb,var(--warn) 24%,transparent)}
    .eco.crit{background:var(--crit-bg);border-color:color-mix(in srgb,var(--crit) 26%,transparent)}
    .eco .badge{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;color:#fff}
    .eco.good .badge{background:var(--good)} .eco.warn .badge{background:var(--warn)} .eco.crit .badge{background:var(--crit)}
    .eco .t b{font-size:13px;display:block;letter-spacing:-.01em}
    .eco.good .t b{color:var(--good)} .eco.warn .t b{color:var(--warn)} .eco.crit .t b{color:var(--crit)}
    .eco .t p{margin:2px 0 0;font-size:12px;color:var(--ink-soft);line-height:1.45}
    .eco .t .tip{margin-top:6px;font-size:11.5px;font-weight:600}

    .artist .artist-in{display:flex;gap:12px;padding:13px 15px;align-items:flex-start}
    .artist .mono{width:40px;height:40px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;font-weight:800;font-size:19px;background:var(--accent-bg);color:var(--accent-2);letter-spacing:-.02em}
    .artist .eyebrow-s{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:3px}
    .artist .a-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .artist .a-top b{font-size:14px;letter-spacing:-.01em}
    .artist .disc{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
    .artist p{margin:4px 0 0;font-size:12px;color:var(--ink-soft);line-height:1.45}
    .artist .fact{display:flex;gap:7px;align-items:flex-start;margin-top:8px;font-size:11.5px;color:var(--accent-2);font-weight:600}
    .artist .fact svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px}

    .section-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;padding:6px 4px 0}
    .wx-card .card-h .wx-emoji{font-size:20px;line-height:1;flex:0 0 auto}
    .wx{display:flex;align-items:center;gap:14px}
    .wx .now{font-size:30px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
    .wx .now-k{font-size:11px;color:var(--ink-faint);font-weight:600;margin-top:4px}
    .wx .fc{margin-left:auto;display:flex;gap:12px}
    .wx .fc div{text-align:center;font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
    .wx .fc b{display:block;font-size:13px;color:var(--ink);margin-top:2px}
    .news{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
    .ticker{display:flex;align-items:stretch;cursor:pointer;user-select:none}
    .ticker-src{flex:0 0 auto;font-size:9.5px;font-weight:800;letter-spacing:.03em;color:#fff;background:var(--accent);padding:0 11px;text-transform:uppercase;display:flex;align-items:center}
    .ticker-view{flex:1 1 auto;min-width:0;overflow:hidden;position:relative;white-space:nowrap;-webkit-mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 20px),transparent);mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 20px),transparent)}
    .ticker-track{display:inline-flex;white-space:nowrap;will-change:transform;animation:ticker 45s linear infinite}
    .ticker-track span{padding:9px 0;font-size:12px;color:var(--ink-soft);font-weight:500}
    .ticker:hover .ticker-track,.ticker:focus-visible .ticker-track{animation-play-state:paused}
    .ticker:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
    .ticker-chev{flex:0 0 auto;width:16px;height:16px;color:var(--ink-faint);margin:0 10px;align-self:center;transition:transform .25s}
    .news.open .ticker-chev{transform:rotate(180deg)}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .news-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
    .news-body>div{overflow:hidden}
    .news.open .news-body{grid-template-rows:1fr}
    .news-list{padding:2px 14px 12px}
    .news-list .nrow{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line-2);font-size:12.5px;color:var(--ink);line-height:1.35;text-decoration:none}
    .news-list .nrow:first-child{border-top:0}
    .news-list .nrow::before{content:"›";color:var(--accent);font-weight:800;flex:0 0 auto}
    @media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}
    .btn{appearance:none;font-family:inherit;cursor:pointer;border-radius:var(--r-sm);font-weight:600;font-size:13.5px;padding:13px 14px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;background:var(--accent);color:#fff;text-decoration:none;transition:transform .1s,background .18s;margin-top:2px}
    .btn:active{transform:scale(.985)} .btn .ic{width:17px;height:17px}
    .hidden{display:none !important}
    .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="screen">

    <div class="topbar">
      <span class="brand">
        <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="2.4" fill="var(--accent)"/>
          <path d="M6.5 6.5a7.8 7.8 0 000 11M17.5 6.5a7.8 7.8 0 010 11M3.6 3.6a11.9 11.9 0 000 16.8M20.4 3.6a11.9 11.9 0 010 16.8" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
        </svg>
        <span class="brand-txt">ATALIAN <b class="site" id="brandSite"></b></span>
      </span>
      <span class="seg lang" id="lang">
        <a data-l="nl">NL</a><a data-l="fr">FR</a><a data-l="en">EN</a>
      </span>
    </div>

    <div class="hero">
      <div class="kicker" id="kicker"></div>
      <h2><span id="roomName"></span> <span class="sub" id="roomSub"></span></h2>
      <div class="note" id="heroNote"></div>
    </div>

    <div class="card">
      <div class="card-h">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v6M12 21v-3M4 8a8 8 0 0116 0c0 4-3 5-4 8H8c-1-3-4-4-4-8z"/></svg>
        <h3 id="comfortTitle"></h3>
        <span class="meta"><span id="updLabel"></span> <span id="updT"></span></span>
      </div>
      <div class="card-b" id="comfortBody">
        <div class="loading"><span class="spin"></span> <span id="loadingTxt"></span></div>
      </div>
    </div>

    <div class="card artist hidden" id="artistCard">
      <div class="artist-in">
        <div class="mono" id="artMono"></div>
        <div class="at">
          <div class="eyebrow-s" id="artEyebrow"></div>
          <div class="a-top"><b id="artName"></b><span class="disc" id="artDisc"></span></div>
          <p id="artBlurb"></p>
          <div class="fact"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.2 1 2.5h6c0-1.3.3-1.8 1-2.5A6 6 0 0 0 12 3z"/></svg><span id="artFact"></span></div>
        </div>
      </div>
    </div>

    <div class="card hidden" id="drukteCard">
      <div class="card-h">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="8" r="3"/><circle cx="16.5" cy="9" r="2.3"/><path d="M4 19c0-2.8 2.2-5 5-5s5 2.2 5 5M15 19c0-2 .6-3.6 2-4.4"/></svg>
        <h3 id="drukteTitle"></h3>
        <span class="meta" id="drukMeta"></span>
      </div>
      <div class="card-b">
        <div class="drukte">
          <span class="druk-bars" id="drukBars"><b></b><b></b><b></b></span>
          <span class="druk-txt"><b id="drukLvl"></b><span id="drukSub"></span></span>
        </div>
      </div>
    </div>

    <div class="section-label" id="handigLabel"></div>

    <div class="card wx-card hidden" id="weatherCard">
      <div class="card-h">
        <span class="wx-emoji" id="wxEmoji">🌤️</span>
        <h3 id="weatherTitle"></h3>
      </div>
      <div class="card-b">
        <div class="wx">
          <div>
            <div class="now"><span id="wxTemp">–</span>°</div>
            <div class="now-k" id="wxPlace"></div>
          </div>
          <div class="fc" id="wxFc"></div>
        </div>
      </div>
    </div>

    <div class="eco good hidden" id="eco">
      <div class="badge"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15 5 17 4.5 19 2c1 5 .8 12-4 15a7 7 0 0 1-4 3z"/><path d="M9 15c1.5-3 3.5-5 6-6.5"/></svg></div>
      <div class="t"><b id="ecoTitle"></b><p id="ecoBody"></p><div class="tip" id="ecoTip"></div></div>
    </div>

    <div class="news hidden" id="news">
      <div class="ticker" id="tickerBar" role="button" tabindex="0" aria-expanded="false">
        <div class="ticker-src" id="newsSrc"></div>
        <div class="ticker-view"><div class="ticker-track" id="tickerTrack"></div></div>
        <svg class="ticker-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="news-body"><div><div class="news-list" id="newsList"></div></div></div>
    </div>

    <a class="btn" id="meldBtn" href="#">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 9v4M12 17h.01M10.3 3.9 2.6 17.5A2 2 0 0 0 4.3 20.5h15.4a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
      <span id="meldTxt"></span>
    </a>
  </div>

  <script>
    // ---- URL-parameters (code-first; kale id enkel voor dev) ----------
    const qs = new URLSearchParams(location.search);
    const env = qs.get('env') === 'test' ? 'test' : 'prod';
    const debug = qs.get('debug') === '1';

    // Demo-simulatie: overschrijf sensor-/weerwaarden via de URL om het advies te tonen.
    // bv. ?simCo2=1300&simIn=28&simOut=33&simWin=2&simTherm=ja
    const sim = {
      co2:  qs.has('simCo2') ? Number(qs.get('simCo2')) : null,
      tin:  qs.has('simIn')  ? Number(qs.get('simIn'))  : null,
      tout: qs.has('simOut') ? Number(qs.get('simOut')) : null,
      win:  qs.has('simWin') ? Number(qs.get('simWin')) : null,
      therm: qs.has('simTherm') ? /^(1|true|ja|yes|y|j)$/i.test(qs.get('simTherm')) : null,
      hour: qs.has('simHour') ? Number(qs.get('simHour')) : null,
      code: qs.has('simCode') ? Number(qs.get('simCode')) : null,
      occ:  qs.has('simOcc') ? Number(qs.get('simOcc')) : null,
      people: qs.has('simPeople') ? Number(qs.get('simPeople')) : null,
      cap:  qs.has('simCap') ? Number(qs.get('simCap')) : null,
      eco:  qs.get('simEco') || null,
    };

    function idFromCode(code){
      if (!/^\d{8,20}$/.test(code)) return '';
      let id = ''; for (let i = 0; i < code.length - 1; i += 2) id += code[i];
      return id;
    }
    function codeFromId(id){ return /^\d+$/.test(id) ? [...id].map(d => d + d).join('') + '0' : ''; }

    const rawCode = (qs.get('code') || '').trim();
    let spaceId = (qs.get('id') || qs.get('spaceId') || '').trim();
    if (rawCode && !spaceId) spaceId = idFromCode(rawCode);
    const qrCode = rawCode || codeFromId(spaceId);

    let lang = (qs.get('lang') || (navigator.language || 'nl').slice(0,2)).toLowerCase();
    if (!['nl','fr','en'].includes(lang)) lang = 'nl';
    document.documentElement.lang = lang;
    const tr = (nl, fr, en) => (lang === 'fr' ? fr : lang === 'en' ? en : nl);
    const pickLang = (o) => (o && typeof o === 'object') ? (o[lang] || o.nl || '') : '';

    // ---- statische labels ---------------------------------------------
    document.getElementById('kicker').textContent      = tr('Gescand lokaal', 'Local scanné', 'Scanned room');
    document.getElementById('comfortTitle').textContent = tr('Comfort & luchtkwaliteit', 'Confort & qualité de l’air', 'Comfort & air quality');
    document.getElementById('updLabel').textContent    = tr('Bijgewerkt', 'Mis à jour', 'Updated');
    document.getElementById('loadingTxt').textContent  = tr('Sensordata ophalen…', 'Chargement…', 'Loading sensor data…');
    document.getElementById('meldTxt').textContent     = tr('Meld een probleem', 'Signaler un problème', 'Report a problem');
    document.getElementById('artEyebrow').textContent  = tr('Naamgever van deze ruimte', 'Personne qui a donné son nom', 'Namesake of this room');
    document.getElementById('handigLabel').textContent = tr('Handig vandaag', 'Pratique aujourd’hui', 'Handy today');
    document.getElementById('drukteTitle').textContent = tr('Drukte', 'Occupation', 'Occupancy');
    document.getElementById('weatherTitle').textContent = tr('Weer & buiten', 'Météo & extérieur', 'Weather & outside');

    document.querySelectorAll('#lang a').forEach(a => {
      if (a.dataset.l === lang) a.classList.add('on');
      a.addEventListener('click', e => { e.preventDefault(); const u = new URL(location.href); u.searchParams.set('lang', a.dataset.l); location.href = u.toString(); });
    });

    // ---- Melden: terug naar het traditionele portaal (round-trip) -----
    (function buildMeldLink(){
      const u = new URL('/portal.html', location.origin);
      if (qrCode) u.searchParams.set('code', qrCode);
      u.searchParams.set('lang', lang);
      u.searchParams.set('env', env);
      u.searchParams.set('src', location.href);
      u.searchParams.set('melden', '1');
      document.getElementById('meldBtn').setAttribute('href', u.toString());
    })();

    // ---- Ruimte-info (naam, gebouw, klant) ----------------------------
    async function loadRoomInfo(){
      if (!spaceId) return;
      try {
        const r = await fetch(`/.netlify/functions/space?id=${encodeURIComponent(spaceId)}&lang=${lang}&env=${env}`);
        if (!r.ok) return;
        const d = await r.json();
        if (d.description) document.getElementById('roomName').textContent = d.description;
        if (d.buildingName) document.getElementById('brandSite').textContent = d.buildingName;
        document.getElementById('heroNote').textContent = [d.clientName, d.buildingName].filter(Boolean).join(' · ');
      } catch {}
    }

    // ---- Comfort-kaart ------------------------------------------------
    function comfortForCo2(co2){
      if (co2 == null || isNaN(co2)) return null;
      if (co2 < 900)   return { cls:'good', txt: tr('Frisse lucht', 'Air frais', 'Fresh air') };
      if (co2 <= 1200) return { cls:'warn', txt: tr('Ventileer even', 'Aérez un peu', 'Ventilate a bit') };
      return { cls:'crit', txt: tr('Ventileer nu', 'Aérez maintenant', 'Ventilate now') };
    }
    function fmtTime(ts){
      if (!ts) return '';
      const d = new Date(ts); if (isNaN(d)) return '';
      return d.toLocaleTimeString(lang === 'fr' ? 'fr-BE' : lang === 'en' ? 'en-GB' : 'nl-BE', { hour:'2-digit', minute:'2-digit' });
    }
    const num = (v, dec=0) => (v==null||isNaN(v)) ? '–' : Number(v).toFixed(dec);
    const cssVar = { good:'var(--good)', warn:'var(--warn)', crit:'var(--crit)' };

    // ---- Verlucht-advies: CO2 bepaalt OF, buitentemp bepaalt HOE LANG; ramen/thermostaat = poortwachters ----
    let _room = null, _weather = null;
    function ventAdvice({ co2, indoor, outdoor, weatherCode, hour, windows, thermostat, comfort = 21 }){
      const parts = [];
      const hasWin = windows == null ? true : windows > 0; // onbekend → aannemen dat er een raam is
      const dOut = (outdoor != null) ? (outdoor - comfort) : null;

      if (co2 != null && co2 >= 900) {           // CO2 bepaalt OF er verlucht moet worden
        const tone = co2 > 1200 ? 'crit' : 'warn';
        if (!hasWin) {
          parts.push({ icon:'⚠️', tone, txt: tr(
            'Luchtkwaliteit is verhoogd, maar dit lokaal heeft geen raam. Zet eventueel even de deur open, verhoog de ventilatie of meld het hieronder.',
            'Qualité de l’air élevée, mais ce local n’a pas de fenêtre. Ouvrez éventuellement la porte un instant, augmentez la ventilation ou signalez-le ci-dessous.',
            'Air quality is elevated, but this room has no window. Consider opening the door for a moment, increase ventilation, or report it below.') });
        } else if (dOut != null && dOut > 6) {
          parts.push({ icon:'🪟', tone, txt: tr(
            'Verlucht kort en sluit daarna, om extra opwarming te vermijden.',
            'Aérez brièvement puis refermez, pour éviter un réchauffement supplémentaire.',
            'Ventilate briefly, then close to avoid extra heating.') });
        } else if (dOut != null && dOut < -6) {
          parts.push({ icon:'🪟', tone, txt: tr(
            'Verlucht kort en sluit daarna, om warmteverlies te beperken.',
            'Aérez brièvement puis refermez, pour limiter les pertes de chaleur.',
            'Ventilate briefly, then close to limit heat loss.') });
        } else {
          parts.push({ icon:'🪟', tone, txt: tr(
            'Zet het raam open tot de luchtkwaliteit weer verbetert.',
            'Ouvrez la fenêtre jusqu’à ce que la qualité de l’air s’améliore.',
            'Open the window until the air quality improves.') });
        }
      }

      if (indoor != null && thermostat) {        // thermostaat aanwezig → bij thermisch ongemak
        if (indoor >= 26 && outdoor != null && outdoor > 26) {
          // hittegolf: binnen én buiten warm → de thermostaat kan de hitte niet wegwerken
          parts.push({ icon:'🌡️', tone:'warn', txt: tr(
            'Het is warm, ook buiten. Sluit ramen en zonwering, drink voldoende water; de thermostaat kan de hitte niet wegwerken.',
            'Il fait chaud, aussi dehors. Fermez fenêtres et stores, buvez suffisamment; le thermostat ne peut pas évacuer la chaleur.',
            'It’s warm, outside too. Close windows and blinds, stay hydrated; the thermostat can’t remove this heat.') });
        } else if (indoor >= 26 && outdoor != null) {
          // abnormaal warm: binnen warmer dan buiten → wellicht thermostaat verkeerd ingesteld
          parts.push({ icon:'🌡️', tone:'warn', txt: tr(
            `Het is hier warmer dan buiten. Controleer of de thermostaat juist staat (±${comfort}°C).`,
            `Il fait plus chaud ici que dehors. Vérifiez le réglage du thermostat (±${comfort}°C).`,
            `It’s warmer here than outside. Check the thermostat setting (±${comfort}°C).`) });
        } else if (indoor >= 26) {
          // buitentemp onbekend → geen vergelijking, generiek advies
          parts.push({ icon:'🌡️', tone:'warn', txt: tr(
            `Het is hier wat warm. Controleer of de thermostaat juist staat (±${comfort}°C).`,
            `Il fait un peu chaud ici. Vérifiez le réglage du thermostat (±${comfort}°C).`,
            `It’s a bit warm here. Check the thermostat setting (±${comfort}°C).`) });
        } else if (indoor < 19) {
          // te koel → thermostaat controleren
          parts.push({ icon:'🌡️', tone:'warn', txt: tr(
            `Het is hier wat koel. Controleer of de thermostaat juist staat (±${comfort}°C).`,
            `Il fait un peu frais ici. Vérifiez le réglage du thermostat (±${comfort}°C).`,
            `It’s a bit cool here. Check the thermostat setting (±${comfort}°C).`) });
        }
      }
      // Sluit-raam-reminder (tegen inbraak): enkel bij mooi weer, vanaf de namiddag, én als er een raam is.
      if (windows > 0 && weatherCode != null && weatherCode <= 2 && hour != null && hour >= 13) {
        parts.push({ icon:'🔒', tone:'good', txt: tr(
          'Mooi weer. Vergeet bij het verlaten niet het raam te sluiten (tegen inbraak).',
          'Beau temps. En partant, n’oubliez pas de fermer la fenêtre (contre le cambriolage).',
          'Nice weather. When you leave, don’t forget to close the window (against burglary).') });
      }
      return parts;
    }
    function renderDrukte(){
      // Gebouw-brede bezettingsgraad (%) uit RealPulse — betrouwbaarder dan een headcount.
      const card = document.getElementById('drukteCard');
      if (!card) return;
      const occ = _weather && _weather.occupancy;
      let rate = sim.occ != null ? sim.occ : (occ ? occ.rate : null);
      if (rate == null) return;                          // geen bezettingsdata → kaart verbergen
      rate = Math.max(0, Math.min(100, Math.round(Number(rate))));

      let lvl, cls, on;
      if (rate < 30)      { lvl = tr('Rustig', 'Calme', 'Quiet');        cls = 'good'; on = 1; }
      else if (rate < 70) { lvl = tr('Gemiddeld', 'Modéré', 'Moderate'); cls = 'warn'; on = 2; }
      else                { lvl = tr('Druk', 'Occupé', 'Busy');          cls = 'crit'; on = 3; }

      const bars = document.getElementById('drukBars');
      bars.className = 'druk-bars ' + cls;
      [...bars.children].forEach((b, i) => b.classList.toggle('on', i < on));
      document.getElementById('drukLvl').textContent = lvl;
      document.getElementById('drukSub').textContent = tr(`${rate}% vergaderzalen bezet`, `${rate}% des salles occupées`, `${rate}% of meeting rooms in use`);
      document.getElementById('drukMeta').textContent = tr('in het gebouw', 'dans le bâtiment', 'in the building');
      card.classList.remove('hidden');
    }
    function ecoTip(){
      const tips = [
        tr('Zet schermen en verlichting uit bij het verlaten.', 'Éteignez écrans et lumières en partant.', 'Turn off screens and lights when you leave.'),
        tr('Vergaderzaal vrij? Verwarm of koel ze niet onnodig.', 'Salle libre ? Ne la chauffez/climatisez pas inutilement.', 'Room free? Don’t heat or cool it needlessly.'),
        tr('Neem de trap in plaats van de lift.', 'Prenez l’escalier plutôt que l’ascenseur.', 'Take the stairs instead of the lift.'),
      ];
      return tips[Math.floor(Math.random() * tips.length)];
    }
    function renderEco(){
      // Slimme eco-badge: verbruik afgezet tegen uur-van-de-dag + bezetting.
      const el = document.getElementById('eco');
      const en = _weather && _weather.energy;
      if (!el || !en || en.daily == null) return;

      const hour = sim.hour != null ? sim.hour : new Date().getHours();
      const afterHours = hour < 7 || hour >= 19;                         // buiten kantooruren
      const occRate = (_weather && _weather.occupancy) ? _weather.occupancy.rate : null;
      const rate = sim.occ != null ? sim.occ : occRate;
      const avgHourly = en.daily / Math.max(1, hour);                    // ruw daggemiddelde per uur
      const high = en.hourly != null && en.hourly > avgHourly * 1.3;     // dit uur duidelijk boven gemiddelde

      const forced = ['good', 'warn', 'crit'].includes(sim.eco) ? sim.eco : null;
      let tone, title, body, tip = '';
      if (forced === 'crit' || (!forced && afterHours && high)) {
        tone = 'crit';
        title = tr('Verbruik buiten de uren', 'Consommation hors heures', 'After-hours use');
        body  = tr('Nog volop verbruik terwijl het gebouw dicht is. Kijk of er iets onnodig aanstaat.',
                   'Consommation élevée alors que le bâtiment est fermé. Vérifiez si quelque chose tourne inutilement.',
                   'Still high consumption while the building is closed. Check if something is left on.');
      } else if (forced === 'warn' || (!forced && !afterHours && rate != null && rate < 20 && high)) {
        tone = 'warn';
        title = tr('Verhoogd verbruik', 'Consommation élevée', 'Elevated use');
        body  = tr('Veel verbruik bij lage bezetting. Zet ongebruikte toestellen of verlichting uit.',
                   'Consommation élevée pour une faible occupation. Éteignez les appareils/lumières inutiles.',
                   'High consumption at low occupancy. Switch off unused devices or lights.');
      } else {
        tone = 'good';
        title = tr('Energievriendelijk', 'Écoénergétique', 'Energy-friendly');
        body  = tr(`Efficiënt verbruik. Vandaag ${Math.round(en.daily)} kWh in het gebouw.`,
                   `Consommation efficace. ${Math.round(en.daily)} kWh aujourd’hui.`,
                   `Efficient use. ${Math.round(en.daily)} kWh today.`);
        tip = ecoTip();
      }

      el.classList.remove('good', 'warn', 'crit');
      el.classList.add(tone);
      document.getElementById('ecoTitle').textContent = title;
      document.getElementById('ecoBody').textContent = body;
      document.getElementById('ecoTip').textContent = tip;
      el.classList.remove('hidden');
    }
    function renderAdvice(){
      const el = document.getElementById('advies');
      if (!el || !_room || !_room.coupled) return;
      const wxNow = (_weather && _weather.now) ? _weather.now : {};
      const hour = sim.hour != null ? sim.hour : new Date().getHours();
      const parts = ventAdvice({ co2:_room.co2, indoor:_room.temp, outdoor: wxNow.temp ?? null, weatherCode: wxNow.code ?? null, hour, windows:_room.windows, thermostat:_room.thermostat });
      el.innerHTML = parts.map(p => `<div class="adv adv-${p.tone}"><span>${p.icon}</span><span>${p.txt}</span></div>`).join('');
    }

    async function loadComfort(){
      const body = document.getElementById('comfortBody');
      if (!spaceId){ body.innerHTML = `<div class="muted">${tr('Geen lokaal opgegeven.', 'Aucun local indiqué.', 'No room specified.')}</div>`; return; }
      try {
        const r = await fetch(`/.netlify/functions/room?spaceId=${encodeURIComponent(spaceId)}&env=${env}${debug?'&debug=1':''}`);
        const d = await r.json();
        if (!r.ok) { body.innerHTML = `<div class="muted">${tr('Sensordata tijdelijk niet beschikbaar.', 'Données momentanément indisponibles.', 'Sensor data temporarily unavailable.')}</div>`; return; }

        // Demo-simulatie toepassen (toont de kaart ook zonder sensor).
        if (sim.co2 != null) d.co2 = sim.co2;
        if (sim.tin != null) d.temp = sim.tin;
        if (sim.win != null) d.windows = sim.win;
        if (sim.therm != null) d.thermostat = sim.therm;
        if (!d.coupled && (sim.co2 != null || sim.tin != null)) d.coupled = true;

        if (!d.coupled) { body.innerHTML = `<div class="muted">${tr('Dit lokaal heeft (nog) geen sensoren.', 'Ce local n’a pas (encore) de capteurs.', 'This room has no sensors (yet).')}</div>`; return; }

        const c = comfortForCo2(d.co2);
        const gw = d.co2 == null ? 0 : Math.max(4, Math.min(100, Math.round((Number(d.co2) - 400) / (1500 - 400) * 100)));
        const gcol = cssVar[c ? c.cls : 'good'];
        document.getElementById('updT').textContent = fmtTime(d.updatedAt);
        body.innerHTML = `
          <div class="metrics">
            <div class="metric"><div class="n">${num(d.temp,1)}<span class="u">°C</span></div><div class="k">${tr('Temperatuur','Température','Temperature')}</div></div>
            <div class="metric"><div class="n">${num(d.co2)}</div><div class="k">CO₂ ppm</div></div>
            <div class="metric"><div class="n">${num(d.hum)}<span class="u">%</span></div><div class="k">${tr('Vocht','Humidité','Humidity')}</div></div>
          </div>
          ${c ? `<div class="verdict ${c.cls}"><svg class="vi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 8v5M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg><span>${c.txt}</span></div>` : ''}
          <div class="gauge"><i style="width:${gw}%;background:${gcol}"></i></div>
          <div class="gauge-cap"><span>400</span><span>1500 ppm</span></div>
          <div class="advies" id="advies"></div>
        `;
        _room = d;
        renderAdvice();
      } catch {
        body.innerHTML = `<div class="muted">${tr('Sensordata tijdelijk niet beschikbaar.', 'Données momentanément indisponibles.', 'Sensor data temporarily unavailable.')}</div>`;
      }
    }

    // ---- Naamgever-kaart (Ultimo-document) ----------------------------
    async function loadNaamgever(){
      if (!spaceId) return;
      try {
        const r = await fetch(`/.netlify/functions/content?spaceId=${encodeURIComponent(spaceId)}&env=${env}${debug?'&debug=1':''}`);
        if (!r.ok) return;
        const d = await r.json();
        const ng = d.content && d.content.naamgever;
        if (!ng || !ng.naam) return;

        document.getElementById('artName').textContent  = ng.naam;
        document.getElementById('artMono').textContent  = ng.naam.trim().charAt(0).toUpperCase();
        document.getElementById('artDisc').textContent  = pickLang(ng.discipline);
        document.getElementById('artBlurb').textContent = pickLang(ng.omschrijving);
        const weetjes = Array.isArray(ng.weetjes) ? ng.weetjes : [];
        if (weetjes.length) {
          const w = weetjes[Math.floor(Math.random() * weetjes.length)];
          document.getElementById('artFact').textContent = pickLang(w);
        } else {
          document.querySelector('#artistCard .fact').style.display = 'none';
        }
        document.getElementById('artistCard').classList.remove('hidden');
      } catch {}
    }

    // ---- Live nieuws-ticker (server-side RSS/Atom via news.js) --------
    function esc(s){ const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
    async function loadNews(){
      try {
        const r = await fetch(`/.netlify/functions/news?lang=${lang}`);
        if (!r.ok) return;
        const d = await r.json();
        const items = Array.isArray(d.items) ? d.items : [];
        if (!items.length) return;

        document.getElementById('newsSrc').textContent = d.source || tr('Nieuws', 'Actu', 'News');
        const line = items.map(i => esc(i.title)).join(' • ') + ' • ';
        const track = document.getElementById('tickerTrack');
        track.innerHTML = `<span>${line}</span><span>${line}</span>`;
        // Duur evenredig met de breedte → vaste, rustige leessnelheid (~55 px/s) i.p.v. te snel.
        requestAnimationFrame(() => {
          const half = track.scrollWidth / 2;
          if (half > 0) track.style.animationDuration = Math.max(24, Math.round(half / 55)) + 's';
        });
        document.getElementById('newsList').innerHTML = items.map(i =>
          i.link
            ? `<a class="nrow" href="${esc(i.link)}" target="_blank" rel="noopener">${esc(i.title)}</a>`
            : `<div class="nrow">${esc(i.title)}</div>`
        ).join('');

        const news = document.getElementById('news');
        const bar  = document.getElementById('tickerBar');
        const toggle = () => { const open = news.classList.toggle('open'); bar.setAttribute('aria-expanded', open ? 'true' : 'false'); };
        bar.addEventListener('click', toggle);
        bar.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
        news.classList.remove('hidden');
      } catch {}
    }

    // ---- Weerkaart (live buitentemp via IoT + forecast via Open-Meteo) ----
    function wmoEmoji(c){
      if (c == null) return '🌡️';
      if (c === 0) return '☀️';
      if (c <= 2) return '🌤️';
      if (c === 3) return '☁️';
      if (c >= 45 && c <= 48) return '🌫️';
      if (c >= 51 && c <= 67) return '🌧️';
      if (c >= 71 && c <= 77) return '🌨️';
      if (c >= 80 && c <= 82) return '🌦️';
      if (c >= 95) return '⛈️';
      return '🌡️';
    }
    const hourLabel = (h) => lang === 'nl' ? `${h}u` : `${h}h`;
    async function loadWeather(){
      try {
        const r = await fetch(`/.netlify/functions/weather?lang=${lang}`);
        if (!r.ok) return;
        const d = await r.json();
        if (sim.tout != null) { d.now = d.now || {}; d.now.temp = sim.tout; }
        if (sim.code != null) { d.now = d.now || {}; d.now.code = sim.code; }
        const fc = Array.isArray(d.forecast) ? d.forecast : [];
        if (d.now?.temp == null && !fc.length) return;

        document.getElementById('wxEmoji').textContent = wmoEmoji(d.now && d.now.code);
        document.getElementById('wxTemp').textContent  = (d.now && d.now.temp != null) ? Math.round(d.now.temp) : '–';
        document.getElementById('wxPlace').textContent = [d.place, tr('eigen sensor', 'capteur propre', 'own sensor')].filter(Boolean).join(' · ');
        document.getElementById('wxFc').innerHTML = fc.map(f => `<div>${hourLabel(f.hour)}<b>${f.temp}°</b></div>`).join('');
        document.getElementById('weatherCard').classList.remove('hidden');
        _weather = d;
        renderDrukte();
        renderEco();
        renderAdvice();
      } catch {}
    }

    loadRoomInfo();
    loadComfort();
    loadNaamgever();
    loadWeather();
    loadNews();
  </script>
</body>
