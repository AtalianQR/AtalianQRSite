<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Monitor — Atalian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060a11;
  --s1:       #0c1422;
  --s2:       #111d30;
  --b1:       #1a2a40;
  --b2:       #243550;
  --text:     #dde4f0;
  --muted:    #4a6080;
  --dim:      #2a3f5a;
  --acc:      #e8a030;
  --acc-dim:  rgba(232,160,48,.12);
  --acc-glow: rgba(232,160,48,.25);
  --prod:     #34d399;
  --prod-bg:  rgba(52,211,153,.10);
  --test:     #60a5fa;
  --test-bg:  rgba(96,165,250,.10);
  --unk:      #a78bfa;
  --unk-bg:   rgba(167,139,250,.10);
  --eq:       #fb923c;
  --sp:       #38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.5}

/* ─── BACKGROUND GRID ─────────────────────── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--b1) 1px,transparent 1px),
    linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.3;pointer-events:none;z-index:0;
}

/* ─── LAYOUT ──────────────────────────────── */
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ─── TOPBAR ──────────────────────────────── */
header{
  display:flex;align-items:center;gap:16px;
  padding:16px 24px;
  border-bottom:1px solid var(--b1);
  background:rgba(6,10,17,.85);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--acc);border:1px solid var(--acc);padding:4px 10px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;
}
header h1{font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--text)}
header h1 span{color:var(--muted);font-weight:400}
.spacer{flex:1}
#status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--muted);
  box-shadow:0 0 0 2px var(--bg);transition:all .3s;
}
#status-dot.ok{background:var(--prod);box-shadow:0 0 8px var(--prod)}
#status-dot.err{background:#f87171;box-shadow:0 0 8px #f87171}
#status-dot.loading{background:var(--acc);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#status-txt{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:7px 14px;border-radius:6px;cursor:pointer;
  border:1px solid var(--b2);background:var(--s2);color:var(--text);transition:all .2s;
}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.primary{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

/* ─── MAIN ────────────────────────────────── */
main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:20px}

/* ─── KPI STRIP ───────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s;
}
.kpi:hover{border-color:var(--b2)}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:0;transition:opacity .2s;
}
.kpi:hover::before{opacity:1}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace}
.kpi-acc .kpi-val{color:var(--acc)}

/* ─── BODY GRID ───────────────────────────── */
.body-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;min-height:0}

/* ─── SECTION HEADER ──────────────────────── */
.sec-head{
  display:flex;align-items:center;gap:10px;
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;
}
.sec-head::after{content:'';flex:1;height:1px;background:var(--b1)}
.sec-head em{color:var(--acc);font-style:normal;font-family:'JetBrains Mono',monospace}

/* ─── LOCATION CARDS ──────────────────────── */
.locs{display:flex;flex-direction:column;gap:10px}
.loc-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:16px 18px;display:grid;
  grid-template-columns:auto 1fr auto;
  gap:0 20px;align-items:center;
  transition:border-color .2s,background .2s;cursor:default;
}
.loc-card:hover{border-color:var(--b2);background:var(--s2)}
.loc-code{
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;
  color:var(--text);letter-spacing:.05em;line-height:1;
}
.loc-code small{display:block;font-size:10px;color:var(--muted);font-weight:400;margin-top:3px;letter-spacing:.1em}
.loc-meta{display:flex;flex-direction:column;gap:8px}
.loc-meta-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.loc-bars{display:flex;gap:3px;align-items:flex-end;height:28px}
.loc-bar{
  width:6px;border-radius:2px 2px 0 0;
  background:var(--acc);opacity:.6;
  transition:opacity .2s;min-height:2px;
}
.loc-bar.today{opacity:1;background:var(--acc)}
.loc-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.scan-count{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--acc);line-height:1}
.scan-label{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.last-seen{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* ─── BADGES ──────────────────────────────── */
.badge{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;
  border:1px solid;white-space:nowrap;
}
.badge.prod{color:var(--prod);background:var(--prod-bg);border-color:rgba(52,211,153,.25)}
.badge.test{color:var(--test);background:var(--test-bg);border-color:rgba(96,165,250,.25)}
.badge.unk{color:var(--unk);background:var(--unk-bg);border-color:rgba(167,139,250,.25)}
.badge.eq{color:var(--eq);background:rgba(251,146,60,.10);border-color:rgba(251,146,60,.25)}
.badge.sp{color:var(--sp);background:rgba(56,189,248,.10);border-color:rgba(56,189,248,.25)}
.badge.nl{color:var(--text);background:var(--s2);border-color:var(--b1)}
.badge.fr{color:#f472b6;background:rgba(244,114,182,.10);border-color:rgba(244,114,182,.25)}
.badge.acc{color:var(--acc);background:var(--acc-dim);border-color:rgba(232,160,48,.3)}

/* ─── FEED ────────────────────────────────── */
.feed-panel{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px;display:flex;flex-direction:column;max-height:600px}
.feed-list{overflow-y:auto;display:flex;flex-direction:column;gap:1px;flex:1}
.feed-list::-webkit-scrollbar{width:4px}
.feed-list::-webkit-scrollbar-track{background:transparent}
.feed-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.feed-item{
  display:grid;grid-template-columns:80px 1fr auto;
  gap:8px;align-items:center;padding:8px 6px;
  border-radius:6px;transition:background .15s;
}
.feed-item:hover{background:var(--s2)}
.feed-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.feed-info{display:flex;flex-direction:column;gap:2px}
.feed-type{
  font-size:11px;font-weight:600;letter-spacing:.06em;
  font-family:'JetBrains Mono',monospace;
}
.feed-type.url_load{color:var(--acc)}
.feed-type.pagehide{color:var(--muted)}
.feed-type.idle{color:var(--dim)}
.feed-type.step{color:var(--test)}
.feed-type.other{color:var(--muted)}
.feed-code{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.feed-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

/* ─── FILTERS ─────────────────────────────── */
.filters{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:var(--s1);border:1px solid var(--b1);border-radius:8px;
  padding:10px 14px;font-size:12px;
}
.filter-label{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
label.chk{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--text);user-select:none}
label.chk input{accent-color:var(--acc);width:13px;height:13px;cursor:pointer}
.filter-sep{width:1px;height:18px;background:var(--b1)}

/* ─── CHART ───────────────────────────────── */
.chart-panel{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px 18px}
.chart-wrap{position:relative;height:90px;display:flex;gap:3px;align-items:flex-end}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.chart-bar{
  width:100%;border-radius:3px 3px 0 0;background:var(--acc);
  transition:opacity .2s;cursor:default;min-height:2px;
  position:relative;
}
.chart-bar.today{background:var(--acc);box-shadow:0 0 8px var(--acc-glow)}
.chart-bar.empty-day{background:var(--b1)}
.chart-bar:hover{opacity:.8}
.chart-day{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-align:center}
.chart-day.today{color:var(--acc)}
.chart-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--b2);border-radius:6px;
  padding:4px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;
  color:var(--text);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:10;
}
.chart-col:hover .chart-tooltip{opacity:1}

/* ─── EMPTY / LOADING ─────────────────────── */
.empty{
  text-align:center;padding:48px 20px;color:var(--muted);
  font-size:13px;font-family:'JetBrains Mono',monospace;
}
.empty big{display:block;font-size:32px;margin-bottom:8px;opacity:.3}

/* ─── RESPONSIVE ──────────────────────────── */
@media(max-width:1000px){
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .body-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  main{padding:12px}
}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<header>
  <div class="logo">ATL</div>
  <h1>Portal Monitor <span>/ QR activiteit</span></h1>
  <div class="spacer"></div>
  <div id="status-dot" class="loading"></div>
  <span id="status-txt">Laden…</span>
  <button class="btn primary" id="btnRefresh">↻ Vernieuwen</button>
</header>

<main>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">Omgeving</span>
    <label class="chk"><input type="checkbox" id="fProd" checked> <span class="badge prod">prod</span></label>
    <label class="chk"><input type="checkbox" id="fTest"> <span class="badge test">test</span></label>
    <label class="chk"><input type="checkbox" id="fUnk"> <span class="badge unk">onbekend</span></label>
    <div class="filter-sep"></div>
    <span class="filter-label">Periode</span>
    <label class="chk" style="gap:6px">
      Van <input type="date" id="fFrom" style="background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:5px;padding:3px 6px;font-size:12px;font-family:'JetBrains Mono',monospace">
      t/m <input type="date" id="fTo"   style="background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:5px;padding:3px 6px;font-size:12px;font-family:'JetBrains Mono',monospace">
    </label>
    <div class="spacer"></div>
    <span id="filter-count" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)"></span>
  </div>

  <!-- KPI STRIP -->
  <div class="kpi-strip">
    <div class="kpi kpi-acc">
      <div class="kpi-label">Totaal scans</div>
      <div class="kpi-val" id="k-scans">—</div>
      <div class="kpi-sub" id="k-scans-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Actieve locaties</div>
      <div class="kpi-val" id="k-locs">—</div>
      <div class="kpi-sub" id="k-locs-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Vandaag</div>
      <div class="kpi-val" id="k-today">—</div>
      <div class="kpi-sub">scans vandaag</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Taal NL / FR</div>
      <div class="kpi-val" id="k-lang">—</div>
      <div class="kpi-sub" id="k-lang-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Prod / Test</div>
      <div class="kpi-val" id="k-env">—</div>
      <div class="kpi-sub" id="k-env-sub"></div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-panel">
    <div class="sec-head" style="margin-bottom:8px">Scans per dag <em id="chart-range"></em> <span id="chart-crumb" style="margin-left:8px"></span></div>
    <div id="chart-legend" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div class="chart-wrap" id="chart-wrap"></div>
  </div>

  <!-- BODY -->
  <div class="body-grid">

    <!-- LOCATIONS -->
    <div>
      <div class="sec-head">Locaties <em id="loc-count"></em></div>
      <div class="locs" id="locs-list">
        <div class="empty"><big>⏳</big>Laden…</div>
      </div>
    </div>

    <!-- FEED -->
    <div style="display:flex;flex-direction:column">
      <div class="sec-head">Recente activiteit <em id="feed-count"></em></div>
      <div class="feed-panel">
        <div class="feed-list" id="feed-list">
          <div class="empty"><big>⏳</big>Laden…</div>
        </div>
      </div>
    </div>

  </div>
</main>
</div>

<script>
const API = '/.netlify/functions/read_logs';
const TZ  = 'Europe/Brussels';

// ── helpers ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = {
  time: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,hour:'2-digit',minute:'2-digit'}).format(new Date(+ts)),
  date: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,day:'numeric',month:'short'}).format(new Date(+ts)),
  datetime: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(+ts)),
  dayKey: ts => {
    const d = new Date(+ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
};

function todayKey(){ return fmt.dayKey(Date.now()); }

function readEnv(ev){
  const d = (ev.env||ev.environment||'').toString().toLowerCase();
  if(d==='prod'||d==='production') return 'prod';
  if(d==='test'||d==='acc'||d==='accept') return 'test';
  const h = (() => { try{ return new URL(ev.href||ev.url||'').hostname; }catch{ return ''; } })();
  if(/test|staging/i.test(h)) return 'test';
  if(h.includes('netlify.app')&&!h.includes('test')) return 'prod';
  return 'unknown';
}

function decode6(code){
  const s = String(code||'');
  if(/^\d{13}$/.test(s)) return s[0]+s[2]+s[4]+s[6]+s[8]+s[10];
  if(s.length>6) return s.slice(-6);
  return s;
}

function getType(ev){
  if(ev.isEquipment===true||ev.isEquipment==='true') return 'equipment';
  const s = String(ev.code||ev.id||'');
  if(s.slice(-1)==='9') return 'equipment';
  if(s.slice(-1)==='0') return 'space';
  return 'unknown';
}

function badge(cls,txt){ return `<span class="badge ${cls}">${txt}</span>`; }
function typeBadge(t){ return t==='equipment'?badge('eq','Equipment'):t==='space'?badge('sp','Space'):badge('unk','?'); }
function envBadge(e){ return e==='prod'?badge('prod','prod'):e==='test'?badge('test','test'):badge('unk','unk'); }
function langBadge(l){ return l==='fr'?badge('fr','FR'):badge('nl','NL'); }

function setStatus(txt, state){
  $('status-txt').textContent = txt;
  $('status-dot').className = state||'';
}

// ── state ────────────────────────────────────────────────
let ALL_EVENTS = [];

// ── fetch ────────────────────────────────────────────────
async function fetchData(){
  setStatus('Laden…','loading');
  try {
    const r = await fetch(`${API}?limit=150`, {cache:'no-store'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    ALL_EVENTS = Array.isArray(d.items) ? d.items : [];
    setStatus(`${ALL_EVENTS.length} events · ${new Date().toLocaleTimeString('nl-BE')}`, 'ok');
    render();
  } catch(e){
    setStatus(`Fout: ${e.message}`, 'err');
  }
}

// ── filter ───────────────────────────────────────────────
function getFiltered(){
  const fProd = $('fProd').checked;
  const fTest = $('fTest').checked;
  const fUnk  = $('fUnk').checked;
  const from  = $('fFrom').value ? new Date($('fFrom').value).setHours(0,0,0,0) : null;
  const to    = $('fTo').value   ? new Date($('fTo').value).setHours(23,59,59,999) : null;

  return ALL_EVENTS.filter(ev => {
    const env = readEnv(ev);
    if(!fProd && env==='prod') return false;
    if(!fTest && env==='test') return false;
    if(!fUnk  && env==='unknown') return false;
    const ts = ev.ts||0;
    if(from && ts < from) return false;
    if(to   && ts > to)   return false;
    return true;
  });
}

// ── render ───────────────────────────────────────────────
function render(){
  const events = getFiltered();
  const scans  = events.filter(e=>e.type==='url_load'||e.type==='visit');
  const today  = todayKey();

  $('filter-count').textContent = `${events.length} events`;

  // ── KPIs
  const todayScans = scans.filter(e=>fmt.dayKey(e.ts)===today).length;
  const nlCount = scans.filter(e=>(e.lang||'nl')==='nl').length;
  const frCount = scans.filter(e=>e.lang==='fr').length;
  const prodCount = events.filter(e=>readEnv(e)==='prod').length;
  const testCount = events.filter(e=>readEnv(e)==='test').length;

  const uniqueLocs = new Set(scans.map(e=>e.code||e.id)).size;

  animNum('k-scans', scans.length);
  animNum('k-locs', uniqueLocs);
  animNum('k-today', todayScans);
  $('k-scans-sub').textContent = `van ${events.length} events totaal`;
  $('k-locs-sub').textContent = `unieke QR-codes`;
  $('k-lang').textContent = scans.length ? `${Math.round(nlCount/scans.length*100)}% / ${Math.round(frCount/scans.length*100)}%` : '—';
  $('k-lang-sub').textContent = `${nlCount} NL · ${frCount} FR`;
  $('k-env').textContent = events.length ? `${Math.round(prodCount/events.length*100)}% / ${Math.round(testCount/events.length*100)}%` : '—';
  $('k-env-sub').textContent = `${prodCount} prod · ${testCount} test`;

  // ── Locations
  renderChart(events);

  const locMap = new Map();
  for(const ev of events){
    const code = ev.code||ev.id||'?';
    if(!locMap.has(code)) locMap.set(code,{code,scans:0,events:[],env:'unknown',type:'unknown',lang:{nl:0,fr:0},lastTs:0});
    const loc = locMap.get(code);
    loc.events.push(ev);
    if(ev.type==='url_load'||ev.type==='visit') loc.scans++;
    if(ev.ts>loc.lastTs){ loc.lastTs=ev.ts; loc.env=readEnv(ev); loc.type=getType(ev); }
    if(ev.lang==='fr') loc.lang.fr++; else loc.lang.nl++;
  }

  // Filter locaties op geselecteerde klant
  let locs = [...locMap.values()].sort((a,b)=>b.scans-a.scans);
  if(selectedClient){
    locs = locs.filter(loc=>{
      const ev = [...loc.events].reverse().find(e=>e.clientName);
      return (ev?.clientName||'Onbekend') === selectedClient;
    });
  }
  $('loc-count').textContent = locs.length;

  // Build day buckets for sparkline (last 14 days)
  const days14 = [];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days14.push(fmt.dayKey(d.getTime()));
  }

  const locsHtml = locs.length ? locs.map(loc=>{
    const id6 = decode6(loc.code);
    const buckets = Object.fromEntries(days14.map(d=>[d,0]));
    for(const ev of loc.events){
      const dk=fmt.dayKey(ev.ts);
      if(dk in buckets) buckets[dk]++;
    }
    const vals = Object.values(buckets);
    const maxV = Math.max(1,...vals);
    const bars = vals.map((v,i)=>{
      const h = Math.max(2, Math.round(v/maxV*28));
      const isToday = days14[i]===today;
      return `<div class="loc-bar${isToday?' today':''}" style="height:${h}px" title="${days14[i]}: ${v}"></div>`;
    }).join('');

    const frPct = loc.events.length ? Math.round(loc.lang.fr/loc.events.length*100) : 0;
    const nlPct = 100-frPct;

    const locName = [...loc.events].reverse().find(e=>e.locationName)?.locationName || '';
    const clientName = [...loc.events].reverse().find(e=>e.clientName)?.clientName || '';
    return `<div class="loc-card">
      <div>
        <div class="loc-code">${id6}<small>${loc.code}</small></div>
        ${locName ? `<div style="font-size:11px;color:var(--acc);margin-top:4px;font-weight:600">${locName}</div>` : ''}
        ${clientName ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em">${clientName}</div>` : ''}
      </div>
      <div class="loc-meta">
        <div class="loc-meta-top">
          ${typeBadge(loc.type)}
          ${envBadge(loc.env)}
          ${frPct>0?badge('fr',`FR ${frPct}%`):''}
          ${badge('nl',`NL ${nlPct}%`)}
        </div>
        <div class="loc-bars">${bars}</div>
      </div>
      <div class="loc-right">
        <div class="scan-count">${loc.scans}</div>
        <div class="scan-label">scans</div>
        <div class="last-seen">${loc.lastTs?fmt.datetime(loc.lastTs):'—'}</div>
      </div>
    </div>`;
  }).join('') : '<div class="empty"><big>📭</big>Geen locaties gevonden</div>';

  $('locs-list').innerHTML = locsHtml;

  // ── Feed (last 60 events)
  const feedEvents = [...events].sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,60);
  $('feed-count').textContent = Math.min(60,events.length);

  const feedHtml = feedEvents.length ? feedEvents.map(ev=>{
    const t = ev.type||'event';
    const tClass = ['url_load','pagehide','idle','step'].includes(t)?t:'other';
    const id6 = decode6(ev.code||ev.id||'');
    return `<div class="feed-item">
      <div class="feed-time">${ev.ts?fmt.time(ev.ts):'—'}<br><span style="font-size:10px;color:var(--dim)">${ev.ts?fmt.date(ev.ts):''}</span></div>
      <div class="feed-info">
        <div class="feed-type ${tClass}">${t}</div>
        <div class="feed-code">${id6}</div>
      </div>
      <div class="feed-badges">
        ${envBadge(readEnv(ev))}
        ${langBadge(ev.lang||'nl')}
      </div>
    </div>`;
  }).join('') : '<div class="empty"><big>📭</big>Geen events</div>';

  $('feed-list').innerHTML = feedHtml;
}

// ── chart state ──────────────────────────────────────────────
let selectedClient = null;

// ── chart ───────────────────────────────────────────────────
function renderChart(events){
  const wrap = $('chart-wrap');
  if(!wrap) return;

  const COLORS = ['#e8a030','#34d399','#60a5fa','#f472b6','#a78bfa','#fb923c','#f87171','#4ade80'];
  const DAYS = 30;
  const today = todayKey();
  const days = [];
  for(let i=DAYS-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(fmt.dayKey(d.getTime())); }

  const scans = events.filter(e=>e.type==='url_load'||e.type==='visit');

  // Groepeersleutel: per klant (niveau 1) of per ruimte (niveau 2)
  const getKey = ev => selectedClient
    ? (ev.code||ev.id||'?')
    : (ev.clientName||'Onbekend');
  const getName = (key, ev) => selectedClient
    ? (ev?.locationName || key)
    : key;

  const allKeys = [...new Set(scans.map(getKey))];
  const keyColor = Object.fromEntries(allKeys.map((k,i)=>[k, COLORS[i%COLORS.length]]));

  // Buckets: dag → { key → count }
  const buckets = Object.fromEntries(days.map(d=>[d,{}]));
  for(const ev of scans){
    if(selectedClient && (ev.clientName||'Onbekend') !== selectedClient) continue;
    const dk = fmt.dayKey(ev.ts);
    if(!(dk in buckets)) continue;
    const key = getKey(ev);
    buckets[dk][key] = (buckets[dk][key]||0)+1;
  }
  const vals = days.map(d=>Object.values(buckets[d]).reduce((a,b)=>a+b,0));
  const maxV = Math.max(1,...vals);

  // Broodkruimel
  const crumb = $('chart-crumb');
  if(crumb){
    if(selectedClient){
      crumb.innerHTML = `<span style="cursor:pointer;color:var(--acc);font-family:'JetBrains Mono',monospace;font-size:11px" id="btnBackChart">← Alle klanten</span> <span style="color:var(--muted);font-size:11px">/ ${selectedClient}</span>`;
      const btn = document.getElementById('btnBackChart');
      if(btn) btn.onclick = ()=>{ selectedClient=null; render(); };
    } else {
      crumb.innerHTML = '';
    }
  }

  // Legende
  const legendEl = $('chart-legend');
  if(legendEl){
    legendEl.innerHTML = allKeys.map(key=>{
      const ev = [...scans].reverse().find(e=>getKey(e)===key);
      const name = getName(key, ev);
      const clickable = !selectedClient;
      return `<span data-key="${key}" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;
        color:${clickable?'var(--text)':'var(--muted)'};
        font-family:'JetBrains Mono',monospace;
        cursor:${clickable?'pointer':'default'};
        padding:3px 6px;border-radius:4px;
        border:1px solid ${clickable?'var(--b2)':'transparent'};
        transition:all .2s" class="legend-item">
        <span style="width:10px;height:10px;border-radius:2px;background:${keyColor[key]};flex-shrink:0"></span>
        <span>${name}</span>
      </span>`;
    }).join('');

    if(!selectedClient){
      legendEl.querySelectorAll('.legend-item').forEach(el=>{
        el.addEventListener('mouseenter',()=>el.style.borderColor='var(--acc)');
        el.addEventListener('mouseleave',()=>el.style.borderColor='var(--b2)');
        el.addEventListener('click',()=>{
          selectedClient = el.dataset.key;
          render();
        });
      });
    }
  }

  // Bars
  wrap.innerHTML = [...days].reverse().map(dk=>{
    const total = vals[days.indexOf(dk)];
    const h = total ? Math.max(4, Math.round(total/maxV*80)) : 0;
    const isToday = dk===today;
    const dateStr = new Intl.DateTimeFormat('nl-BE',{day:'numeric',month:'short'}).format(new Date(dk+'T12:00:00'));
    const entries = Object.entries(buckets[dk]).sort((a,b)=>a[0].localeCompare(b[0]));
    const segments = entries.map(([key,cnt],j)=>{
      const sh = Math.max(2, Math.round(cnt/maxV*80));
      return `<div style="height:${sh}px;width:100%;background:${keyColor[key]||'var(--acc)'};border-radius:${j===entries.length-1?'3px 3px 0 0':'0'}"></div>`;
    }).join('');
    return `<div class="chart-col">
      <div class="chart-tooltip">${total} scan${total!==1?'s':''}<br>${dateStr}</div>
      <div class="chart-bar ${isToday?'today':total===0?'empty-day':''}" style="height:${h}px;overflow:hidden;display:flex;flex-direction:column-reverse">
        ${total>0?segments:''}
      </div>
      <div class="chart-day ${isToday?'today':''}">${isToday?'▲':dk.slice(8)}</div>
    </div>`;
  }).join('');
}

// ── animated counter ─────────────────────────────────────
function animNum(id,target){
  const el=$(id); if(!el) return;
  const start=parseInt(el.textContent)||0;
  const diff=target-start; if(!diff){ el.textContent=target; return; }
  const dur=600; const t0=performance.now();
  const step=t=>{
    const prog=Math.min((t-t0)/dur,1);
    const ease=1-Math.pow(1-prog,3);
    el.textContent=Math.round(start+diff*ease);
    if(prog<1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── events ───────────────────────────────────────────────
$('btnRefresh').onclick = fetchData;
['fProd','fTest','fUnk','fFrom','fTo'].forEach(id=>$(id).addEventListener('change',render));

// ── init ─────────────────────────────────────────────────
fetchData();
</script>
