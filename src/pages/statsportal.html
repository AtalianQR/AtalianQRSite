<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Monitor — Atalian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060a11;
  --s1:       #0c1422;
  --s2:       #111d30;
  --b1:       #1a2a40;
  --b2:       #243550;
  --text:     #dde4f0;
  --muted:    #4a6080;
  --dim:      #2a3f5a;
  --acc:      #e8a030;
  --acc-dim:  rgba(232,160,48,.12);
  --acc-glow: rgba(232,160,48,.25);
  --prod:     #34d399;
  --prod-bg:  rgba(52,211,153,.10);
  --test:     #60a5fa;
  --test-bg:  rgba(96,165,250,.10);
  --unk:      #a78bfa;
  --unk-bg:   rgba(167,139,250,.10);
  --eq:       #fb923c;
  --sp:       #38bdf8;
  --dm:       #c084fc;
  --dm-bg:    rgba(192,132,252,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.5}

/* ─── BACKGROUND GRID ─────────────────────── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--b1) 1px,transparent 1px),
    linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.3;pointer-events:none;z-index:0;
}

/* ─── LAYOUT ──────────────────────────────── */
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ─── TOPBAR ──────────────────────────────── */
header{
  display:flex;align-items:center;gap:16px;
  padding:16px 24px;
  border-bottom:1px solid var(--b1);
  background:rgba(6,10,17,.85);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--acc);border:1px solid var(--acc);padding:4px 10px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;
}
header h1{font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--text)}
header h1 span{color:var(--muted);font-weight:400}
.spacer{flex:1}
#status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--muted);
  box-shadow:0 0 0 2px var(--bg);transition:all .3s;
}
#status-dot.ok{background:var(--prod);box-shadow:0 0 8px var(--prod)}
#status-dot.err{background:#f87171;box-shadow:0 0 8px #f87171}
#status-dot.loading{background:var(--acc);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#status-txt{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:7px 14px;border-radius:6px;cursor:pointer;
  border:1px solid var(--b2);background:var(--s2);color:var(--text);transition:all .2s;
}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.primary{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

/* ─── MAIN ────────────────────────────────── */
main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:20px}

/* ─── KPI STRIP ───────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s;
}
.kpi:hover{border-color:var(--b2)}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:0;transition:opacity .2s;
}
.kpi:hover::before{opacity:1}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace}
.kpi-acc .kpi-val{color:var(--acc)}

/* ─── BODY GRID ───────────────────────────── */
.body-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:stretch}

/* ─── SECTION HEADER ──────────────────────── */
.sec-head{
  display:flex;align-items:center;gap:10px;
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;
}
.sec-head::after{content:'';flex:1;height:1px;background:var(--b1)}
.sec-head em{color:var(--acc);font-style:normal;font-family:'JetBrains Mono',monospace}

/* ─── LOCATION CARDS ──────────────────────── */
.locs{display:flex;flex-direction:column;gap:10px}
.loc-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:16px 18px;display:grid;
  grid-template-columns:auto 1fr auto;
  gap:0 20px;align-items:center;
  transition:border-color .2s,background .2s;cursor:default;
}
.loc-card:hover{border-color:var(--b2);background:var(--s2)}
.loc-code{
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;
  color:var(--text);letter-spacing:.05em;line-height:1;
}
.loc-code small{display:block;font-size:10px;color:var(--muted);font-weight:400;margin-top:3px;letter-spacing:.1em}
.loc-meta{display:flex;flex-direction:column;gap:8px}
.loc-meta-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.loc-bars{display:flex;gap:3px;align-items:flex-end;height:28px}
.loc-bar{
  width:6px;border-radius:2px 2px 0 0;
  background:var(--acc);opacity:.6;
  transition:opacity .2s;min-height:2px;
}
.loc-bar.today{opacity:1;background:var(--acc)}
.loc-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.scan-count{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--acc);line-height:1}
.scan-label{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.last-seen{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* ─── DM TABLE ────────────────────────────── */
.dm-table{width:100%;border-collapse:collapse}
.dm-table th{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--b1)}
.dm-table td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.dm-table tr:hover td{background:var(--s2)}
.dm-email{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dm)}
.dm-count{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--acc);text-align:right}

/* ─── BADGES ──────────────────────────────── */
.badge{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;
  border:1px solid;white-space:nowrap;
}
.badge.prod{color:var(--prod);background:var(--prod-bg);border-color:rgba(52,211,153,.25)}
.badge.test{color:var(--test);background:var(--test-bg);border-color:rgba(96,165,250,.25)}
.badge.unk{color:var(--unk);background:var(--unk-bg);border-color:rgba(167,139,250,.25)}
.badge.eq{color:var(--eq);background:rgba(251,146,60,.10);border-color:rgba(251,146,60,.25)}
.badge.sp{color:var(--prod);background:var(--prod-bg);border-color:rgba(52,211,153,.25)}
.badge.nl{color:var(--text);background:var(--s2);border-color:var(--b1)}
.badge.fr{color:#f472b6;background:rgba(244,114,182,.10);border-color:rgba(244,114,182,.25)}
.badge.acc{color:var(--acc);background:var(--acc-dim);border-color:rgba(232,160,48,.3)}

/* ─── FEED ────────────────────────────────── */
.feed-panel{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.feed-list{overflow-y:auto;display:flex;flex-direction:column;gap:1px;flex:1}
.feed-list::-webkit-scrollbar{width:4px}
.feed-list::-webkit-scrollbar-track{background:transparent}
.feed-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.feed-item{
  display:grid;grid-template-columns:80px 1fr auto;
  gap:8px;align-items:center;padding:8px 6px;
  border-radius:6px;transition:background .15s;
}
.feed-item:hover{background:var(--s2)}
.feed-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.feed-info{display:flex;flex-direction:column;gap:2px}
.feed-type{
  font-size:11px;font-weight:600;letter-spacing:.06em;
  font-family:'JetBrains Mono',monospace;
}
.feed-type{color:var(--test)}
.feed-type.url_load{font-weight:700}
.feed-code{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.feed-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

/* ─── FILTERS ─────────────────────────────── */
.filters{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:var(--s1);border:1px solid var(--b1);border-radius:8px;
  padding:10px 14px;font-size:12px;
}
.filter-label{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
label.chk{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--text);user-select:none}
label.chk input{accent-color:var(--acc);width:13px;height:13px;cursor:pointer}
.filter-sep{width:1px;height:18px;background:var(--b1)}

/* ─── CHART ───────────────────────────────── */
.chart-panel{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px 18px}
.chart-wrap{position:relative;height:90px;display:flex;gap:3px;align-items:flex-end}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.chart-bar{
  width:100%;border-radius:3px 3px 0 0;background:var(--acc);
  transition:opacity .2s;cursor:default;min-height:2px;
  position:relative;
}
.chart-bar.today{background:var(--acc);box-shadow:0 0 8px var(--acc-glow)}
.chart-bar.empty-day{background:var(--b1)}
.chart-bar:hover{opacity:.8}
.chart-day{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-align:center}
.chart-day.today{color:var(--acc)}
.chart-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--b2);border-radius:6px;
  padding:4px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;
  color:var(--text);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:10;
}
.chart-col:hover .chart-tooltip{opacity:1}

/* ─── CLIENT GROUP ────────────────────────── */
.client-group{margin-bottom:16px}
.client-header{
  background:var(--s2);border:1px solid var(--b2);border-radius:10px 10px 0 0;
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  border-bottom:2px solid var(--acc);
}
.client-name{font-size:15px;font-weight:700;color:var(--acc);flex:1;letter-spacing:.02em}
.client-total{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--acc)}
.client-total-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.client-locs{border:1px solid var(--b2);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.loc-card-small{
  background:var(--s1);
  padding:10px 18px;display:grid;
  grid-template-columns:80px 1fr auto;
  gap:0 16px;align-items:center;
  border-top:1px solid var(--b1);
  transition:background .15s;
}
.loc-card-small:first-child{border-top:none}
.loc-card-small:hover{background:var(--s2)}
.loc-code-sm{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--muted)}
.loc-info{display:flex;flex-direction:column;gap:2px}
.loc-name-sm{font-size:13px;font-weight:600;color:var(--text)}
.loc-meta-sm{display:flex;gap:6px;align-items:center}
.loc-count-sm{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);text-align:right}
.btn.active-filter{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

/* ─── EMPTY / LOADING ─────────────────────── */
.empty{
  text-align:center;padding:48px 20px;color:var(--muted);
  font-size:13px;font-family:'JetBrains Mono',monospace;
}
.empty big{display:block;font-size:32px;margin-bottom:8px;opacity:.3}

/* ─── RESPONSIVE ──────────────────────────── */
@media(max-width:1000px){
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .body-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  main{padding:12px}
}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<header>
  <div class="logo">ATL</div>
  <h1>Portal Monitor <span>/ QR activiteit</span></h1>
  <div class="spacer"></div>
  <div id="status-dot" class="loading"></div>
  <span id="status-txt">Laden…</span>
  <button class="btn" id="btnExport">⬇ CSV</button>
  <button class="btn primary" id="btnRefresh">↻ Vernieuwen</button>
</header>

<main>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">Omgeving</span>
    <div style="display:flex;gap:0;border:1px solid var(--b2);border-radius:7px;overflow:hidden">
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s" id="lProd">
        <input type="radio" name="env" id="fProd" value="prod" checked style="accent-color:var(--prod);cursor:pointer">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--prod)">PROD</span>
      </label>
      <div style="width:1px;background:var(--b2)"></div>
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s" id="lTest">
        <input type="radio" name="env" id="fTest" value="test" style="accent-color:var(--test);cursor:pointer">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--test)">TEST</span>
      </label>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Gebruiker</span>
    <div style="display:flex;gap:0;border:1px solid var(--b2);border-radius:7px;overflow:hidden">
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s">
        <input type="radio" name="usertype" value="all" checked style="accent-color:var(--acc);cursor:pointer">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--acc)">Alle</span>
      </label>
      <div style="width:1px;background:var(--b2)"></div>
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s">
        <input type="radio" name="usertype" value="klant" style="accent-color:var(--prod);cursor:pointer">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--prod)">Klanten</span>
      </label>
      <div style="width:1px;background:var(--b2)"></div>
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 12px;transition:background .15s">
        <input type="radio" name="usertype" value="dm" style="accent-color:var(--dm);cursor:pointer">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--dm)">DM</span>
      </label>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Periode</span>
    <label class="chk" style="gap:6px">
      Van <input type="date" id="fFrom" style="background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:5px;padding:3px 6px;font-size:12px;font-family:'JetBrains Mono',monospace">
      t/m <input type="date" id="fTo"   style="background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:5px;padding:3px 6px;font-size:12px;font-family:'JetBrains Mono',monospace">
    </label>
    <div class="filter-sep"></div>
    <span class="filter-label">Event type</span>
    <input type="text" id="fEventType" placeholder="url_load, poets_info_viewed…" style="background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:6px;padding:5px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;width:220px">
    <div class="spacer"></div>
    <span id="filter-count" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)"></span>
  </div>

  <!-- KPI STRIP -->
  <div class="kpi-strip">
    <div class="kpi kpi-acc">
      <div class="kpi-label">Klant scans</div>
      <div class="kpi-val" id="k-scans">—</div>
      <div class="kpi-sub" id="k-scans-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Actieve locaties</div>
      <div class="kpi-val" id="k-locs">—</div>
      <div class="kpi-sub" id="k-locs-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Vandaag</div>
      <div class="kpi-val" id="k-today">—</div>
      <div class="kpi-sub">scans vandaag</div>
    </div>
    <div class="kpi" style="border-color:rgba(192,132,252,.3)">
      <div class="kpi-label" style="color:var(--dm)">DM sessies</div>
      <div class="kpi-val" id="k-dm" style="color:var(--dm)">—</div>
      <div class="kpi-sub" id="k-dm-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Prod / Test</div>
      <div class="kpi-val" id="k-env">—</div>
      <div class="kpi-sub" id="k-env-sub"></div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-panel">
    <div class="sec-head" style="margin-bottom:8px"><span id="chart-title">Scans per dag</span> <em id="chart-range"></em> <span id="chart-crumb" style="margin-left:8px"></span></div>
    <div id="chart-legend" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div class="chart-wrap" id="chart-wrap"></div>
  </div>

  <!-- UURDIAGRAM -->
  <div class="chart-panel">
    <div class="sec-head" style="margin-bottom:8px">Scans per uur <em id="hour-day-label">vandaag</em> <span id="hour-back" style="display:none;cursor:pointer;font-size:10px;color:var(--acc);font-family:'JetBrains Mono',monospace;margin-left:8px">← vandaag</span></div>
    <div class="chart-wrap" id="hour-wrap" style="height:70px"></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;padding:0 2px">
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">00u</span>
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">06u</span>
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">12u</span>
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">18u</span>
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">23u</span>
    </div>
  </div>

  <!-- BODY -->
  <div class="body-grid">

    <!-- LOCATIONS -->
    <div>
      <div class="sec-head">Locaties <em id="loc-count"></em></div>
      <div class="locs" id="locs-list">
        <div class="empty"><big>⏳</big>Laden…</div>
      </div>
    </div>

    <!-- FEED -->
    <div style="display:flex;flex-direction:column;min-height:0;overflow:hidden">
      <div class="sec-head">Recente activiteit <em id="feed-count"></em></div>
      <div class="feed-panel" style="flex:1;min-height:0">
        <input type="text" id="feedSearch" placeholder="url_load, poets_info_viewed…"
          style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--b1);border-radius:6px;
                 padding:6px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;margin-bottom:8px;outline:none">
        <div class="feed-list" id="feed-list">
          <div class="empty"><big>⏳</big>Laden…</div>
        </div>
      </div>
    </div>

  </div>
</main>
</div>

<script>
const API = '/.netlify/functions/read_logs';
const TZ  = 'Europe/Brussels';

// ── event-classificatie ──────────────────────────────────
const DM_EVENTS    = new Set(['dm_load','dm_pagehide','dm_auth','dm_complex_selected','dm_counter_clicked','dm_jobs_viewed','dm_site_switched','dm_job_opened']);
const KLANT_EVENTS = new Set(['url_load','visit']);
// location_known: niet als scan tellen, maar wél voor clientName/locationName lookup
const META_EVENTS  = new Set(['location_known']);

function isKlantEvent(ev){ return KLANT_EVENTS.has(ev.type); }
function isDmEvent(ev)   { return DM_EVENTS.has(ev.type); }
function getUserType(){ return document.querySelector('input[name="usertype"]:checked')?.value || 'all'; }

// ── helpers ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = {
  time: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,hour:'2-digit',minute:'2-digit'}).format(new Date(+ts)),
  date: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,day:'numeric',month:'short'}).format(new Date(+ts)),
  datetime: ts => new Intl.DateTimeFormat('nl-BE',{timeZone:TZ,day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(+ts)),
  dayKey: ts => {
    const d = new Date(+ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
};

function todayKey(){ return fmt.dayKey(Date.now()); }

function readEnv(ev){
  const d = (ev.env||ev.environment||'').toString().toLowerCase();
  if(d==='prod'||d==='production') return 'prod';
  if(d==='test'||d==='acc'||d==='accept') return 'test';
  const h = (() => { try{ return new URL(ev.href||ev.url||'').hostname; }catch{ return ''; } })();
  if(/test|staging/i.test(h)) return 'test';
  if(h.includes('netlify.app')&&!h.includes('test')) return 'prod';
  return 'unknown';
}

function decode6(code){
  const s = String(code||'');
  if(/^\d{13}$/.test(s)) return s[0]+s[2]+s[4]+s[6]+s[8]+s[10];
  if(s.length>6) return s.slice(-6);
  return s;
}

function getType(ev){
  if(ev.isEquipment===true||ev.isEquipment==='true') return 'equipment';
  if(ev.isEquipment===false||ev.isEquipment==='false') return 'space';
  const s = String(ev.code||ev.id||'');
  if(s.slice(-1)==='9') return 'equipment';
  return 'space';
}

function badge(cls,txt){ return `<span class="badge ${cls}">${txt}</span>`; }
function typeBadge(t){ return t==='equipment'?badge('eq','Equipment'):t==='space'?badge('sp','Space'):badge('unk','?'); }
function envBadge(e){ return e==='prod'?badge('prod','prod'):e==='test'?badge('test','test'):badge('unk','unk'); }
function langBadge(l){ return l==='fr'?badge('fr','FR'):badge('nl','NL'); }

function setStatus(txt, state){
  $('status-txt').textContent = txt;
  $('status-dot').className = state||'';
}

// ── state ────────────────────────────────────────────────
let ALL_EVENTS = [];
let codeToClient   = {};
let codeToLocation = {};
let codeToBuilding = {};
let globalKeyColor = {}; // dagkaart-kleuren hergebruikt in uurdiagram
let selectedDay    = null; // voor uurdiagram: null = vandaag, anders 'YYYY-MM-DD'

// ── fetch ────────────────────────────────────────────────
async function fetchData(){
  setStatus('Laden…','loading');
  try {
    const r = await fetch(`${API}?limit=300`, {cache:'no-store'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    ALL_EVENTS = Array.isArray(d.items) ? d.items : [];
    setStatus(`${ALL_EVENTS.length} events · ${new Date().toLocaleTimeString('nl-BE')}`, 'ok');
    render();
  } catch(e){
    setStatus(`Fout: ${e.message}`, 'err');
  }
}

// ── filter ───────────────────────────────────────────────
function getEnvMode(){ return document.querySelector('input[name="env"]:checked')?.value || 'prod'; }
function getFiltered(){
  const envMode   = getEnvMode();
  const from      = $('fFrom').value ? new Date($('fFrom').value).setHours(0,0,0,0) : null;
  const to        = $('fTo').value   ? new Date($('fTo').value).setHours(23,59,59,999) : null;
  const typeQuery = ($('fEventType')?.value || '').trim().toLowerCase();

  const userType = getUserType();

  let events = ALL_EVENTS.filter(ev => {
    const env = readEnv(ev);
    if(envMode === 'prod' && env !== 'prod') return false;
    if(envMode === 'test' && env !== 'test' && env !== 'unknown') return false;
    const ts = ev.ts||0;
    if(from && ts < from) return false;
    if(to   && ts > to)   return false;
    if(userType === 'klant' && !isKlantEvent(ev)) return false;
    if(userType === 'dm'    && !isDmEvent(ev))    return false;
    return true;
  });

  // Filter op event type: toon alleen locaties die dat event hebben
  if(typeQuery){
    const matchCodes = new Set(
      events.filter(e => (e.type||'').toLowerCase().includes(typeQuery))
            .map(e => e.code||e.id||'')
    );
    events = events.filter(ev => matchCodes.has(ev.code||ev.id||''));
  }
  return events;
}

// ── render ───────────────────────────────────────────────
function render(){
  const events = getFiltered();
  const scans  = events.filter(e=>e.type==='url_load'||e.type==='visit');
  const today  = todayKey();

  $('filter-count').textContent = `${events.length} events`;

  // ── KPIs — gebruik altijd volledige events-set (env-gefilterd, geen usertype-filter)
  const allEnvEvents = ALL_EVENTS.filter(e => {
    const env = readEnv(e);
    const envMode = getEnvMode();
    if(envMode==='prod' && env!=='prod') return false;
    if(envMode==='test' && env!=='test' && env!=='unknown') return false;
    return true;
  });
  const klantScans = allEnvEvents.filter(isKlantEvent);
  const dmLoads    = allEnvEvents.filter(e=>e.type==='dm_load');

  const todayScans = klantScans.filter(e=>fmt.dayKey(e.ts)===today).length;
  const prodCount  = events.filter(e=>readEnv(e)==='prod').length;
  const testCount  = events.filter(e=>readEnv(e)==='test').length;
  const uniqueLocs = new Set(klantScans.map(e=>e.code||e.id)).size;
  const uniqueDMs  = new Set(dmLoads.map(e=>e.email||'')).size;

  animNum('k-scans', klantScans.length);
  animNum('k-locs',  uniqueLocs);
  animNum('k-today', todayScans);
  animNum('k-dm',    dmLoads.length);
  $('k-scans-sub').textContent = `van ${events.length} gefilterde events`;
  $('k-locs-sub').textContent  = `unieke QR-codes`;
  $('k-dm-sub').textContent    = `${uniqueDMs} DM-gebruikers`;
  $('k-env').textContent = events.length ? `${Math.round(prodCount/events.length*100)}% / ${Math.round(testCount/events.length*100)}%` : '—';
  $('k-env-sub').textContent = `${prodCount} prod · ${testCount} test`;

  // ── Locations
  // Bouw lookup-tabellen voor alle functies
  codeToClient   = {};
  codeToLocation = {};
  codeToBuilding = {};
  for(const ev of ALL_EVENTS){
    const c = ev.code||ev.id||'';
    if(c && ev.clientName)   codeToClient[c]   = ev.clientName;
    if(c && ev.locationName) codeToLocation[c] = ev.locationName;
    if(c && ev.buildingName) codeToBuilding[c] = ev.buildingName;
  }

  renderChart(events);
  // keyColor wordt ingesteld door renderChart — daarna uurdiagram met zelfde kleuren
  renderHourChart(events);

  // ── DM-weergave ──────────────────────────────────────────
  if(getUserType() === 'dm'){
    renderDmView(events);
    return;
  }

  // Locatielijst: altijd alleen klant-events (url_load/visit) — DM-events nooit tonen hier
  const locMap = new Map();
  for(const ev of events){
    if(!isKlantEvent(ev)) continue;  // ← DM-events uitsluiten
    const code = ev.code||ev.id||'?';
    if(!locMap.has(code)) locMap.set(code,{code,scans:0,events:[],env:'unknown',type:'unknown',lang:{nl:0,fr:0},lastTs:0});
    const loc = locMap.get(code);
    loc.events.push(ev);
    loc.scans++;
    if(ev.ts>loc.lastTs){ loc.lastTs=ev.ts; loc.env=readEnv(ev); loc.type=getType(ev); }
    if(ev.lang==='fr') loc.lang.fr++; else loc.lang.nl++;
  }

  // Filter locaties op geselecteerde klant
  let locs = [...locMap.values()].sort((a,b)=>b.scans-a.scans);
  if(selectedClient){
    locs = locs.filter(loc=>{
      const ev = [...loc.events].reverse().find(e=>e.code||e.id);
      return ev ? siteKey(ev) === selectedClient : false;
    });
  }
  $('loc-count').textContent = locs.length;

  // Build day buckets for sparkline (last 14 days)
  const days14 = [];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days14.push(fmt.dayKey(d.getTime()));
  }

  // Groepeer locaties per klant
  const clientMap = new Map();
  for(const loc of locs){
    const ev         = [...loc.events].reverse().find(e=>e.clientName||e.buildingName);
    const locName    = ev?.locationName  || codeToLocation[loc.code] || '';
    const clientName = ev?.clientName    || codeToClient[loc.code]   || 'Onbekend';
    const bldName    = ev?.buildingName  || codeToBuilding[loc.code] || '';
    loc._locName    = locName;
    loc._clientName = clientName;
    const groupKey  = bldName ? `${clientName} — ${bldName}` : clientName;
    if(!clientMap.has(groupKey)) clientMap.set(groupKey,{name:groupKey,locs:[],total:0});
    const cg = clientMap.get(groupKey);
    cg.locs.push(loc);
    cg.total += loc.scans;
  }
  const clientGroups = [...clientMap.values()].sort((a,b)=>b.total-a.total);

  const poetsCodes = new Set(events.filter(e=>e.type==='poets_info_viewed').map(e=>e.code||e.id||''));

  const locsHtml = clientGroups.length ? clientGroups.map(cg=>{
    const locRows = cg.locs.sort((a,b)=>b.scans-a.scans).map(loc=>{
      const id6 = decode6(loc.code);
      const frPct = loc.events.length ? Math.round(loc.lang.fr/loc.events.length*100) : 0;
      const nlPct = 100-frPct;
      const hasPoets = poetsCodes.has(loc.code);
      return `<div class="loc-card-small">
        <div class="loc-code-sm">${id6}<div style="font-size:9px;color:var(--dim)">${loc.code}</div></div>
        <div class="loc-info">
          <div class="loc-name-sm">${loc._locName||'—'} ${hasPoets?'<span title="Poetsprogramma bekeken" style="font-size:11px">🧹</span>':''}</div>
          <div class="loc-meta-sm">
            ${typeBadge(loc.type)}
            ${frPct>0?badge('fr',`FR ${frPct}%`):''}
            ${badge('nl',`NL ${nlPct}%`)}
            <span style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">${loc.lastTs?fmt.date(loc.lastTs):''}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div class="loc-count-sm">${loc.scans}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">scans</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="client-group">
      <div class="client-header">
        <div class="client-name" title="${cg.name}">${cg.name}</div>
        <div style="text-align:right">
          <div class="client-total">${cg.total}</div>
          <div class="client-total-label">scans</div>
        </div>
      </div>
      <div class="client-locs">${locRows}</div>
    </div>`;
  }).join('') : '<div class="empty"><big>📭</big>Geen locaties gevonden</div>';

  $('locs-list').innerHTML = locsHtml;

  // ── Feed (last 60 events)
  const feedQ = ($('feedSearch')?.value || '').trim().toLowerCase();
  const feedFiltered = feedQ
    ? events.filter(e => (e.type||'').toLowerCase().includes(feedQ))
    : events;
  const feedEvents = [...feedFiltered].sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,60);
  $('feed-count').textContent = Math.min(60,events.length);

  const feedHtml = feedEvents.length ? feedEvents.map(ev=>{
    const t = ev.type||'event';
    const tClass = ['url_load','pagehide','idle','step'].includes(t)?t:'other';
    const code = ev.code||ev.id||'';
    const client  = ev.clientName   || codeToClient[code]   || '';
    const locName = ev.locationName  || codeToLocation[code] || decode6(code);
    return `<div class="feed-item">
      <div class="feed-time">${ev.ts?fmt.time(ev.ts):'—'}<br><span style="font-size:10px;color:var(--dim)">${ev.ts?fmt.date(ev.ts):''}</span></div>
      <div class="feed-info">
        <div class="feed-type ${tClass}">${t}</div>
        <div class="feed-code" style="line-height:1.3">
          ${client?`<span style="color:var(--acc);font-size:10px">${client}</span><br>`:''}
          <span>${locName}</span>
        </div>
      </div>
      <div class="feed-badges">
        ${envBadge(readEnv(ev))}
        ${langBadge(ev.lang||'nl')}
      </div>
    </div>`;
  }).join('') : '<div class="empty"><big>📭</big>Geen events</div>';

  $('feed-list').innerHTML = feedHtml;
}

// ── chart state ──────────────────────────────────────────────
let selectedClient = null;

// ── chart ───────────────────────────────────────────────────
function renderChart(events){
  const wrap = $('chart-wrap');
  if(!wrap) return;

  const COLORS    = ['#e8a030','#34d399','#60a5fa','#f472b6','#fb923c','#4ade80','#38bdf8','#fbbf24'];
  const DM_COLORS = COLORS; // DM gebruikt dezelfde kleuren — zelfde complex = zelfde kleur

  // Één consistente kleur per sitenaam — zelfde kleur in ALLE, KLANTEN én DM
  function hashColor(name) {
    let h = 0;
    for(const c of String(name)) h = (h * 31 + c.charCodeAt(0)) >>> 0;
    return COLORS[h % COLORS.length];
  }
  const getColor = key => hashColor(key);
  const DAYS = 30;
  const today = todayKey();
  const days = [];
  for(let i=DAYS-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(fmt.dayKey(d.getTime())); }

  // Grafiek: DM→site-selecties | Alle→klant+DM gecombineerd | Klanten→enkel klant-scans
  const utype = getUserType();
  const scans = utype === 'dm'
    ? events.filter(e=>e.type==='dm_complex_selected')
    : utype === 'alle' || utype === 'all'
      ? events.filter(e=>isKlantEvent(e)||e.type==='dm_complex_selected')
      : events.filter(e=>isKlantEvent(e));

  // Lookup: code → clientName (vanuit álle events, niet alleen url_load)
  // codeToClient/codeToLocation worden bijgewerkt in render() voor globale toegang

  // Groepeer op "Klant — Complex" (analoog aan DM-weergave)
  const siteKey = ev => {
    const code  = ev.code||ev.id||'';
    const cli   = codeToClient[code]   || ev.clientName   || 'Onbekend';
    const bld   = codeToBuilding[code] || ev.buildingName || '';
    return bld ? `${cli} — ${bld}` : cli;
  };

  // Groepeersleutel: per site (niveau 1) of per QR-code (niveau 2 na drill-down)
  const getKey = ev => {
    const ut = getUserType();
    if(ut === 'dm')            return ev.siteName || ev.complexId || '(onbekend)';
    if(isDmEvent(ev))          return ev.siteName || ev.complexId || '(onbekend)'; // DM in ALLE-modus
    if(selectedClient)         return ev.code||ev.id||'?';
    return siteKey(ev);
  };
  const getName = (key, ev) => {
    if(getUserType()==='dm') return key;
    if(selectedClient) return codeToLocation[key] || ev?.locationName || key;
    return key;
  };

  const allKeys = [...new Set(scans.map(getKey))];
  const keyColor = Object.fromEntries(allKeys.map(k=>[k, getColor(k)]));
  globalKeyColor = keyColor; // beschikbaar voor uurdiagram

  // Buckets: dag → { key → count }
  const buckets = Object.fromEntries(days.map(d=>[d,{}]));
  for(const ev of scans){
    // scans is al pre-gefilterd op type; enkel selectedClient-filter nog nodig
    if(selectedClient && getKey(ev) !== selectedClient) continue;
    const dk = fmt.dayKey(ev.ts);
    if(!(dk in buckets)) continue;
    const key = getKey(ev);
    buckets[dk][key] = (buckets[dk][key]||0)+1;
  }
  const vals = days.map(d=>Object.values(buckets[d]).reduce((a,b)=>a+b,0));
  const maxV = Math.max(1,...vals);

  // Grafiektitel afhankelijk van modus
  const titleEl = $('chart-title');
  if(titleEl) titleEl.textContent = getUserType()==='dm' ? 'DM site-selecties per dag' : 'Scans per dag';

  // Broodkruimel
  const crumb = $('chart-crumb');
  if(crumb){
    if(selectedClient){
      crumb.innerHTML = `<span style="cursor:pointer;color:var(--acc);font-family:'JetBrains Mono',monospace;font-size:11px" id="btnBackChart">← Alle klanten</span> <span style="color:var(--muted);font-size:11px">/ ${selectedClient}</span>`;
      const btn = document.getElementById('btnBackChart');
      if(btn) btn.onclick = ()=>{ selectedClient=null; render(); };
    } else {
      crumb.innerHTML = '';
    }
  }

  // Legende
  const legendEl = $('chart-legend');
  if(legendEl){
    legendEl.innerHTML = allKeys.map(key=>{
      const ev = [...scans].reverse().find(e=>getKey(e)===key);
      const name = getName(key, ev);
      const clickable = !selectedClient;
      return `<span data-key="${key}" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;
        color:${clickable?'var(--text)':'var(--muted)'};
        font-family:'JetBrains Mono',monospace;
        cursor:${clickable?'pointer':'default'};
        padding:3px 6px;border-radius:4px;
        border:1px solid ${clickable?'var(--b2)':'transparent'};
        transition:all .2s" class="legend-item">
        <span style="width:10px;height:10px;border-radius:2px;background:${keyColor[key]};flex-shrink:0"></span>
        <span>${name}</span>
      </span>`;
    }).join('');

    if(!selectedClient){
      legendEl.querySelectorAll('.legend-item').forEach(el=>{
        el.addEventListener('mouseenter',()=>el.style.borderColor='var(--acc)');
        el.addEventListener('mouseleave',()=>el.style.borderColor='var(--b2)');
        el.addEventListener('click',()=>{
          selectedClient = el.dataset.key;
          render();
        });
      });
    }
  }

  // Bars
  wrap.innerHTML = [...days].reverse().map(dk=>{
    const total = vals[days.indexOf(dk)];
    const h = total ? Math.max(4, Math.round(total/maxV*80)) : 0;
    const isToday = dk===today;
    const isSelected = dk===selectedDay;
    const dateStr = new Intl.DateTimeFormat('nl-BE',{day:'numeric',month:'short'}).format(new Date(dk+'T12:00:00'));
    const entries = Object.entries(buckets[dk]).sort((a,b)=>a[0].localeCompare(b[0]));
    const segments = entries.map(([key,cnt],j)=>{
      const sh = Math.max(2, Math.round(cnt/maxV*80));
      return `<div style="height:${sh}px;width:100%;background:${keyColor[key]||'var(--acc)'};border-radius:${j===entries.length-1?'3px 3px 0 0':'0'}"></div>`;
    }).join('');
    return `<div class="chart-col" data-day="${dk}" style="cursor:${total>0?'pointer':'default'}" title="${dateStr}: klik voor uurverdeling">
      <div class="chart-tooltip">${total} scan${total!==1?'s':''}<br>${dateStr}</div>
      <div class="chart-bar ${isToday?'today':isSelected?'today':total===0?'empty-day':''}" style="height:${h}px;overflow:hidden;display:flex;flex-direction:column-reverse;${isSelected?'box-shadow:0 0 0 2px var(--acc)':''}">
        ${total>0?segments:''}
      </div>
      <div class="chart-day ${isToday?'today':isSelected?'today':''}">${isToday?'▲':dk.slice(8)}</div>
    </div>`;
  }).join('');

  // Klik op dag → uurdiagram van die dag
  wrap.querySelectorAll('.chart-col[data-day]').forEach(col=>{
    col.addEventListener('click',()=>{
      const dk = col.dataset.day;
      selectedDay = (dk===todayKey()||dk===selectedDay) ? null : dk;
      const hb = $('hour-back');
      if(hb) hb.style.display = selectedDay ? 'inline' : 'none';
      renderHourChart(ALL_EVENTS);
      wrap.querySelectorAll('.chart-col').forEach(c=>{
        const bar=c.querySelector('.chart-bar');
        if(bar){ bar.style.boxShadow = c.dataset.day===selectedDay?'0 0 0 2px var(--acc)':''; }
      });
    });
  });

  const hb = $('hour-back');
  if(hb){
    hb.style.display = selectedDay ? 'inline' : 'none';
    hb.onclick = ()=>{ selectedDay=null; hb.style.display='none'; renderHourChart(ALL_EVENTS); };
  }
}

// ── uurdiagram ───────────────────────────────────────────
function renderHourChart(events){
  const wrap = $('hour-wrap');
  if(!wrap) return;
  const day = selectedDay || todayKey();
  const ut3 = getUserType();
  const scans = events.filter(e => fmt.dayKey(e.ts)===day && (
    ut3==='dm' ? e.type==='dm_complex_selected'
    : ut3==='all'||ut3==='alle' ? (isKlantEvent(e)||e.type==='dm_complex_selected')
    : isKlantEvent(e)
  ));
  const hours = Array(24).fill(0);
  for(const ev of scans) hours[new Date(ev.ts).getHours()]++;
  const maxV = Math.max(1,...hours);
  const nowH = new Date().getHours();
  const isToday = day === todayKey();

  // Label boven de grafiek
  const lbl = $('hour-day-label');
  if(lbl) lbl.textContent = isToday ? 'vandaag' : new Intl.DateTimeFormat('nl-BE',{day:'numeric',month:'short'}).format(new Date(day+'T12:00:00'));

  // Groepeer per uur én per site (zelfde logica als dagdiagram)
  const hourBuckets = Array.from({length:24}, ()=>({}));
  for(const ev of scans){
    if(fmt.dayKey(ev.ts)!==day) continue;
    const h = new Date(ev.ts).getHours();
    const k = getKey(ev);
    hourBuckets[h][k] = (hourBuckets[h][k]||0)+1;
  }
  const hourTotals = hourBuckets.map(b=>Object.values(b).reduce((a,v)=>a+v,0));
  const maxV2 = Math.max(1,...hourTotals);

  wrap.innerHTML = hourBuckets.map((bucket,h)=>{
    const total = hourTotals[h];
    const height = total ? Math.max(4, Math.round(total/maxV2*60)) : 0;
    const isNow = isToday && h === nowH;
    const label = String(h).padStart(2,'0');
    const entries = Object.entries(bucket).sort((a,b)=>a[0].localeCompare(b[0]));
    const segments = entries.map(([k,cnt],j)=>{
      const sh = Math.max(2, Math.round(cnt/maxV2*60));
      const col = globalKeyColor[k] || 'var(--acc)';
      return `<div style="height:${sh}px;width:100%;background:${col};border-radius:${j===entries.length-1?'3px 3px 0 0':'0'}"></div>`;
    }).join('');
    return `<div class="chart-col" title="${label}u: ${total} scan${total!==1?'s':''}">
      <div class="chart-tooltip">${total} scan${total!==1?'s':''}<br>${label}:00</div>
      <div class="chart-bar${isNow?' today':total===0?' empty-day':''}" style="height:${height}px;overflow:hidden;display:flex;flex-direction:column-reverse${isNow?';box-shadow:0 0 8px var(--acc-glow)':''}">
        ${total>0?segments:''}
      </div>
      <div class="chart-day${isNow?' today':''}" style="font-size:8px">${h%6===0?label:'·'}</div>
    </div>`;
  }).join('');
}

// ── animated counter ─────────────────────────────────────
function animNum(id,target){
  const el=$(id); if(!el) return;
  const start=parseInt(el.textContent)||0;
  const diff=target-start; if(!diff){ el.textContent=target; return; }
  const dur=600; const t0=performance.now();
  const step=t=>{
    const prog=Math.min((t-t0)/dur,1);
    const ease=1-Math.pow(1-prog,3);
    el.textContent=Math.round(start+diff*ease);
    if(prog<1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── DM-weergave ─────────────────────────────────────────
function renderDmView(events){
  // Stap 1: bouw email-lookup via dm_auth (bevat altijd email + employeeId)
  const authBySession = new Map(); // href-prefix → email (benadering op basis van gelijktijdige events)
  const knownEmails   = new Set();
  for(const ev of events){
    if(ev.type==='dm_auth' && ev.email) knownEmails.add(ev.email);
  }

  // Stap 2: groepeer alle DM-events per email
  // dm_load heeft geen email (vóór login) → wijs toe aan de enige bekende email als er maar 1 is
  const dmMap = new Map();
  const addEvent = (email, ev) => {
    if(!dmMap.has(email)) dmMap.set(email,{ email, sessions:0, complexes: new Set(), events:[], lastTs:0 });
    const dm = dmMap.get(email);
    dm.events.push(ev);
    if(ev.type==='dm_load')             dm.sessions++;
    if(ev.type==='dm_complex_selected') dm.complexes.add(ev.complexId||'');
    if(ev.ts>dm.lastTs)                 dm.lastTs=ev.ts;
  };

  for(const ev of events){
    const email = ev.email
      || (knownEmails.size===1 ? [...knownEmails][0] : null) // 1 bekende gebruiker → koppel
      || '(onbekend)';
    addEvent(email, ev);
  }

  const dms = [...dmMap.values()].sort((a,b)=>b.sessions-a.sessions);
  $('loc-count').textContent = dms.length;

  if(!dms.length){
    $('locs-list').innerHTML = '<div class="empty"><big>🏢</big>Geen DM-activiteit gevonden</div>';
    return;
  }

  const rows = dms.map(dm=>{
    const complexList = [...dm.complexes].filter(Boolean).join(', ') || '—';
    const counters  = dm.events.filter(e=>e.type==='dm_counter_clicked').length;
    const switches  = dm.events.filter(e=>e.type==='dm_site_switched').length;
    const jobOpened = dm.events.filter(e=>e.type==='dm_job_opened').length;
    return `<tr>
      <td><span class="dm-email">${dm.email}</span></td>
      <td style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${complexList}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc)">${counters}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--prod)">${jobOpened}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">${switches}</td>
      <td style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:right">${dm.lastTs?fmt.datetime(dm.lastTs):'—'}</td>
      <td class="dm-count">${dm.sessions}</td>
    </tr>`;
  }).join('');

  $('locs-list').innerHTML = `
    <table class="dm-table">
      <thead><tr>
        <th>DM-gebruiker</th>
        <th>Bekeken complexen</th>
        <th style="text-align:center">Teller-kliks</th>
        <th style="text-align:center">Jobs geopend</th>
        <th style="text-align:center">Site-wisselingen</th>
        <th style="text-align:right">Laatste activiteit</th>
        <th style="text-align:right">Sessies</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── CSV export ───────────────────────────────────────────
async function exportCSV(){
  const btn = $('btnExport');
  btn.textContent = '⏳ Laden…';
  btn.disabled = true;

  try {
    // Haal alle events op (hogere limiet voor export)
    const r = await fetch(`${API}?limit=2000`, {cache:'no-store'});
    const d = await r.json();
    const items = Array.isArray(d.items) ? d.items : [];

    const cols = ['datum','tijdstip','type','klant','locatie','lokaal_id','type_lokaal','qr_code','taal','omgeving','href'];
    const esc = v => {
      const s = String(v ?? '').replace(/"/g,'""');
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    };

    const rows = [cols.join(',')];
    for(const ev of items){
      const code = ev.code||ev.id||'';
      const ts = ev.ts ? new Date(ev.ts) : null;
      const typeLokaal = (ev.isEquipment===true||ev.isEquipment==='true') ? 'Equipment' : 'Space';
      const id6 = decode6(code);
      rows.push([
        ts ? ts.toLocaleDateString('nl-BE',{timeZone:TZ}) : '',
        ts ? ts.toLocaleTimeString('nl-BE',{timeZone:TZ}) : '',
        ev.type || '',
        codeToClient[code] || ev.clientName || '',
        codeToLocation[code] || ev.locationName || '',
        id6,
        typeLokaal,
        code,
        ev.lang || '',
        readEnv(ev),
        ev.href || ''
      ].map(esc).join(','));
    }

    const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `atalian-portal-stats-${todayKey()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus(`CSV geëxporteerd — ${items.length} events`, 'ok');
  } catch(e) {
    setStatus(`Export mislukt: ${e.message}`, 'err');
  }

  btn.textContent = '⬇ CSV';
  btn.disabled = false;
}

// ── auto-refresh (5 min) ─────────────────────────────────
const REFRESH_SEC = 300;
let refreshTimer = REFRESH_SEC;
let refreshInterval;

function startRefreshTimer(){
  clearInterval(refreshInterval);
  refreshTimer = REFRESH_SEC;
  refreshInterval = setInterval(()=>{
    refreshTimer--;
    const m = Math.floor(refreshTimer/60);
    const s = String(refreshTimer%60).padStart(2,'0');
    const dot = $('status-dot');
    if(dot && dot.className === 'ok')
      $('status-txt').textContent = `${ALL_EVENTS.length} events · ${new Date().toLocaleTimeString('nl-BE')} · ↻ ${m}:${s}`;
    if(refreshTimer <= 0) loadAndRefresh();
  }, 1000);
}

async function loadAndRefresh(){
  setStatus('Laden…','loading');
  try {
    const r = await fetch(`${API}?limit=300`, {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    ALL_EVENTS = Array.isArray(d.items) ? d.items : [];
    setStatus(`${ALL_EVENTS.length} events · ${new Date().toLocaleTimeString('nl-BE')}`, 'ok');
    render();
  } catch(e){
    setStatus(`Fout: ${e.message}`, 'err');
  }
  startRefreshTimer();
}

// ── init ─────────────────────────────────────────────────
loadAndRefresh();
