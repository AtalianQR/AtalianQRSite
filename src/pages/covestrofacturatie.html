<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covestro Facturatie</title>

  <link rel="icon" href="/AtalianFavicon.png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6fa;
      min-height: 100vh;
    }
    * { box-sizing: border-box; }

    .test-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #28a745;
      color: white;
      text-align: center;
      padding: 5px 0;
      font-weight: bold;
      z-index: 1000;
      font-size: 14px;
      text-transform: uppercase;
      opacity: 0.9;
    }
    body.is-test { padding-top: 30px; }

    header { padding: 0.5rem 1rem 0; }
    .header-flex {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      gap: .5rem;
    }
    img.logo {
      max-height: 60px;
      background: rgba(255,255,255,0.85);
      padding: .1rem;
      border-radius: 12px;
    }

    .page-card {
      max-width: 1400px;
      margin: 1rem auto 2rem;
      background: #fff;
      border: 2px solid #EE7E00;
      border-radius: 12px;
      box-shadow: 0 6px 32px rgba(0,0,0,.12),0 1.5px 8px rgba(238,126,0,.10);
      padding: 1.25rem 1.5rem 1.5rem;
    }
    .page-card h1 { margin: 0 0 .5rem; font-size: 1.4rem; }

    input[type="password"], input[type="text"] {
      padding: .5rem .6rem;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: .95rem;
      width: 100%;
      max-width: 280px;
    }

    .btn {
      border-radius: 999px;
      padding: .55rem 1.4rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: .95rem;
    }
    .btn-primary { background: #EE7E00; color: #fff; }
    .btn-primary:active { background: #d86e00; }
    .btn-primary:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

    .status { margin-top: .5rem; font-size: .9rem; color: #6b7280; }
    .status.error { color: #b91c1c; }

    table.building-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; table-layout: fixed; }
    table.building-table td, table.building-table th { padding: .4rem .6rem; font-size: .9rem; text-align: left; overflow-wrap: break-word; }
    tr.building-header { background: #6b7280; color: #fff; font-weight: 600; }
    span.building-total { font-weight: 700; color: #fde047; }
    tr.building-header.done { background: #9ca3af; }
    tr.column-header-row th { background: #e5e7eb; font-weight: 700; }
    tr.job-row { background: #fff; color: #000; }
    tr.job-row.done { background: #e5e7eb; color: #6b7280; }
    tr.job-row td.code-group-start { border-top: 1px solid #d1d5db; }
    td.num-right, th.num-right { text-align: right; font-variant-numeric: tabular-nums; }
    table.building-table td:nth-child(5) { white-space: nowrap; }
    .grand-total {
      margin: .75rem 0 1rem;
      padding: .75rem 1rem;
      background: #EE7E00;
      color: #fff;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      display: none;
    }
    .grand-total span { font-size: 1.35rem; }
    .loonweek-global { margin: 0 0 1rem; padding: .6rem .8rem; background: #eef2f7; border-radius: 8px; font-size: .95rem; }
    .loonweek-global select { margin-left: .5rem; }
    span.copy-part { cursor: pointer; padding: 0 .15rem; border-radius: 4px; background: #fff200; color: #1f2937; }
    tr.job-row.done span.copy-part { cursor: default; background: #e5e7eb; }
    span.copy-part.copied-flash { background: #22c55e !important; color: #fff; }
    .vorderingsnummer-input { width: 140px; margin-right: .5rem; }
    span.copy-part.loonweek-chip { margin-right: .6rem; font-weight: 600; white-space: nowrap; }
    .periode-select { margin-right: .5rem; padding: .3rem; border-radius: 6px; }
    td.vordering-cell { white-space: nowrap; }
    .job-error { color: #b91c1c; font-size: .8rem; }

    .building-head-cell { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    button.btn-jobid-toggle { flex-shrink: 0; background: #fff; color: #1f2937; border: 1px solid #d1d5db; border-radius: 999px; padding: .12rem .6rem; font-size: .76rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    button.btn-jobid-toggle:hover { background: #f3f4f6; }
    tr.jobid-detail-row > td { background: #eaf2fb; border-left: 3px solid #3b82f6; padding: .5rem .8rem; }
    .jobid-detail-title { font-size: .82rem; font-weight: 700; color: #1e3a8a; margin: 0 0 .4rem; }
    table.jobid-detail-table { width: 100%; border-collapse: collapse; }
    table.jobid-detail-table th, table.jobid-detail-table td { padding: .25rem .5rem; font-size: .82rem; border-bottom: 1px solid #cdddf2; text-align: left; color: #1f2937; }
    table.jobid-detail-table th { background: #d5e6fa; color: #1e3a8a; font-weight: 700; }
    table.jobid-detail-table tr.jid-a td { background: #e3eefb; }
    table.jobid-detail-table tr.jid-b td { background: #f3f8fe; }
    table.jobid-detail-table tr.jid-start td { border-top: 2px solid #93b4e6; }
    table.jobid-detail-table td.num-right, table.jobid-detail-table th.num-right { text-align: right; font-variant-numeric: tabular-nums; }

    .pending-section { margin-top: 2rem; border: 2px solid #f59e0b; border-radius: 10px; background: #fffbeb; padding: 1rem 1.25rem; }
    .pending-section h2 { margin: 0 0 .25rem; font-size: 1.1rem; color: #92400e; }
    .pending-section p.pending-intro { margin: 0 0 .75rem; font-size: .88rem; color: #92400e; }
    table.pending-table { width: 100%; border-collapse: collapse; }
    table.pending-table th, table.pending-table td { padding: .4rem .6rem; font-size: .88rem; text-align: left; border-bottom: 1px solid #fcd34d; overflow-wrap: break-word; }
    table.pending-table th { background: #fde68a; color: #7c2d12; font-weight: 700; }
    table.pending-table tr:last-child td { border-bottom: none; }
  </style>
</head>

<body>
  <div id="test-indicator" style="display:none" class="test-banner">
    ⚠️ TEST OMGEVING ACTIEF
  </div>

  <header>
    <div class="header-flex">
      <img src="/AtalianLogo.png" alt="Atalian Logo" class="logo" />
    </div>
  </header>

  <main>
    <section class="page-card" id="password-card">
      <h1>Covestro facturatie</h1>
      <p>Geef het wachtwoord in om verder te gaan.</p>
      <input type="password" id="password-input" autocomplete="off" />
      <button type="button" id="password-submit" class="btn btn-primary" style="margin-left:.5rem;">Inloggen</button>
      <div class="status" id="password-status"></div>
    </section>

    <section class="page-card" id="main-card" style="display:none">
      <h1>Covestro facturatie</h1>
      <button type="button" id="btn-load" class="btn btn-primary">Lijst herladen</button>
      <div class="status" id="load-status"></div>
      <div id="grand-total" class="grand-total">Totaal over alle gebouwen: <span id="grand-total-value">€ 0,00</span></div>
      <div id="building-filter-wrap" class="loonweek-global" style="display:none">
        <label for="building-filter"><strong>Filter op gebouw:</strong></label>
        <select id="building-filter" class="periode-select"><option value="">Alle gebouwen</option></select>
      </div>
      <div id="buildings-container"></div>
      <div id="pending-container"></div>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(window.location.search);
    const host = location.host || '';
    const isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
    const isTestEnv = qs.has('test') || qs.get('env') === 'test' || /test|staging/i.test(host);
    const FUNCTION_URL = '/.netlify/functions/covestro_vordering';

    function initEnvBanner() {
      if (isTestEnv) {
        document.getElementById('test-indicator').style.display = 'block';
        document.body.classList.add('is-test');
      }
    }

    function getPortalPassword() {
      return sessionStorage.getItem('covestroPw') || '';
    }
    function setPortalPassword(pw) {
      sessionStorage.setItem('covestroPw', pw);
    }
    function clearPortalPassword() {
      sessionStorage.removeItem('covestroPw');
    }

    async function apiFetch(action, { method = 'GET', body } = {}) {
      const url = method === 'GET'
        ? `${FUNCTION_URL}?action=${encodeURIComponent(action)}`
        : FUNCTION_URL;

      const res = await fetch(url, {
        method,
        headers: {
          'X-Portal-Password': getPortalPassword(),
          ...(body ? { 'Content-Type': 'application/json' } : {}),
        },
        body: body ? JSON.stringify({ action, ...body }) : undefined,
      });

      if (res.status === 401) {
        clearPortalPassword();
        showPasswordScreen('Wachtwoord verlopen of ongeldig. Log opnieuw in.');
        throw new Error('UNAUTHORIZED');
      }

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data?.error || `HTTP ${res.status}`);
      }
      return data;
    }

    function showPasswordScreen(message) {
      document.getElementById('password-card').style.display = 'block';
      document.getElementById('main-card').style.display = 'none';
      document.getElementById('password-status').textContent = message || '';
      document.getElementById('password-status').classList.toggle('error', !!message);
    }

    let hasAutoLoaded = false;
    function showMainScreen() {
      document.getElementById('password-card').style.display = 'none';
      document.getElementById('main-card').style.display = 'block';
      if (!hasAutoLoaded) {
        hasAutoLoaded = true;
        loadList();
      }
    }

    async function trySubmitPassword() {
      const pw = String(document.getElementById('password-input').value || '').trim();
      if (!pw) return;

      setPortalPassword(pw);
      try {
        await apiFetch('CHECK_PASSWORD');
        showMainScreen();
      } catch (err) {
        clearPortalPassword();
        document.getElementById('password-status').textContent = 'Fout wachtwoord.';
        document.getElementById('password-status').classList.add('error');
      }
    }

    document.getElementById('password-submit').onclick = trySubmitPassword;
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') trySubmitPassword();
    });

    async function initSession() {
      initEnvBanner();
      if (isLocalhost) {
        // Op localhost is er geen wachtwoord nodig - de functie draait onder netlify dev
        // en slaat de wachtwoordcheck daar over.
        showMainScreen();
        return;
      }
      if (getPortalPassword()) {
        try {
          await apiFetch('CHECK_PASSWORD');
          showMainScreen();
        } catch (err) {
          showPasswordScreen();
        }
      } else {
        showPasswordScreen();
      }
    }

    initSession();

    let buildingGroups = []; // blokken per gebouw+loonweek: [{ blockKey, building, externalId, loonweekKey, loonweekLabel, beschrLoonweek, processable, codeGroups: Map<code, jobs[]>, jobsById }]
    let pendingJobs = [];    // jobs met een 00633-lijn (nacalculatie): niet factureren, wel apart tonen

    function groupJobs(jobs) {
      const byBlock = new Map();

      for (const job of jobs) {
        const buildingKey = String(job.Building || '').trim() || '(onbekend gebouw)';
        const date = parseSchedDate(job.ScheduledStartDate);
        const lw = date ? loonweekInfo(date) : unknownLoonweekInfo();
        const blockKey = `${buildingKey}||${lw.key}`;

        if (!byBlock.has(blockKey)) {
          byBlock.set(blockKey, {
            blockKey,
            building: buildingKey,
            externalId: String(job.ExternalId || '').trim(),
            loonweekKey: lw.key,
            loonweekLabel: lw.label,
            loonweekShort: lw.shortLabel,
            sortYear: lw.year,
            sortWeek: lw.week,
            beschrLoonweek: lw.beschrLoonweek,
            processable: lw.key !== UNKNOWN_LW_KEY,
            codeGroups: new Map(),
            jobsById: new Map(),
          });
        }
        const block = byBlock.get(blockKey);
        const codeKey = String(job.Code || '').trim() || '(geen code)';
        if (!block.codeGroups.has(codeKey)) block.codeGroups.set(codeKey, []);
        block.codeGroups.get(codeKey).push(job);
        block.jobsById.set(String(job.JobId || '').trim(), job);
      }

      const blocks = Array.from(byBlock.values());
      blocks.sort((a, b) => {
        const byBuilding = String(a.building).localeCompare(String(b.building), undefined, { numeric: true });
        if (byBuilding !== 0) return byBuilding;
        // Onbekende loonweek achteraan.
        if (a.loonweekKey === UNKNOWN_LW_KEY) return b.loonweekKey === UNKNOWN_LW_KEY ? 0 : 1;
        if (b.loonweekKey === UNKNOWN_LW_KEY) return -1;
        return (a.sortYear - b.sortYear) || (a.sortWeek - b.sortWeek);
      });
      return blocks;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function formatAantal(value) {
      const num = parseFloat(String(value == null ? '' : value).replace(',', '.'));
      return Number.isFinite(num) ? String(num).replace('.', ',') : String(value == null ? '' : value);
    }

    // Loonweek = ISO 8601-week: weken beginnen op maandag, week 1 is de week met de eerste
    // donderdag van het jaar. Geeft zowel het weeknummer als het ISO-weekjaar terug (het jaar
    // van de donderdag van die week). Rond de jaarwissel volgt hieruit vanzelf dat begin januari
    // nog in week 52/53 van het vorige weekjaar valt (en eind december in week 1 van het volgende).
    function getLoonweek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = (d.getUTCDay() + 6) % 7; // maandag=0 ... zondag=6
      d.setUTCDate(d.getUTCDate() - dayNum + 3); // donderdag van deze ISO-week
      const isoYear = d.getUTCFullYear();
      const firstThursday = new Date(Date.UTC(isoYear, 0, 4));
      const ftDayNum = (firstThursday.getUTCDay() + 6) % 7;
      firstThursday.setUTCDate(firstThursday.getUTCDate() - ftDayNum + 3);
      const week = 1 + Math.round((d - firstThursday) / (7 * 86400000));
      // d is nu de donderdag van deze ISO-week; die bepaalt zowel het weekjaar als de
      // maand-indicatie (deterministisch, ook als de week over een maandgrens loopt).
      const thursday = new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      return { isoYear, week, thursday };
    }

    const UNKNOWN_LW_KEY = 'GEEN';

    // Parseert ScheduledStartDate defensief. Verwacht 'YYYY-MM-DD' (uit WFL #formatdate),
    // valt terug op 'DD-MM-YYYY'. Leeg/onparsbaar -> null.
    function parseSchedDate(str) {
      const s = String(str == null ? '' : str).trim();
      if (!s) return null;
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) {
        const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        return Number.isNaN(d.getTime()) ? null : d;
      }
      m = s.match(/^(\d{2})-(\d{2})-(\d{4})/);
      if (m) {
        const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
        return Number.isNaN(d.getTime()) ? null : d;
      }
      return null;
    }

    // Groep = gebouw × loonweek (o.b.v. ScheduledStartDate).
    // Label = "LW <weekjaar>/<week> (<maand jaar>)", bv. "LW 2026/29 (juli 2026)".
    function loonweekInfo(date) {
      const { isoYear, week, thursday } = getLoonweek(date);
      const ww = String(week).padStart(2, '0');
      const shortLabel = `LW ${isoYear}/${ww}`;
      const maandNaam = thursday.toLocaleDateString('nl-BE', { month: 'long', year: 'numeric' });
      return {
        year: isoYear,
        week,
        key: `${isoYear}-W${ww}`,
        label: `${shortLabel} (${maandNaam})`,
        shortLabel,
        beschrLoonweek: { isoYear, week, maandNaam },
      };
    }

    function unknownLoonweekInfo() {
      return {
        year: null,
        week: null,
        key: UNKNOWN_LW_KEY,
        label: 'Loonweek onbekend',
        shortLabel: '',
        beschrLoonweek: null,
      };
    }

    function getBeschrijving(code, isoYear, week, maandNaam) {
      if (String(code || '').trim() !== 'BL 2 - LA 2') return '';
      const nu = getLoonweek(new Date());
      const y = Number.isFinite(isoYear) ? isoYear : nu.isoYear;
      const w = Number.isFinite(week) ? week : nu.week;
      const ww = String(w).padStart(2, '0');
      const maand = maandNaam || nu.thursday.toLocaleDateString('nl-BE', { month: 'long', year: 'numeric' });
      return `Materiaallevering incl handelingstoeslag Ultimo - LW ${y}/${ww} (${maand})`;
    }

    function updateBeschrijvingen() {
      document.querySelectorAll('.beschrijving-part[data-blockkey]').forEach((span) => {
        const blockKey = span.getAttribute('data-blockkey');
        const code = span.getAttribute('data-code');
        const block = buildingGroups.find(b => b.blockKey === blockKey);
        const bl = block && block.beschrLoonweek ? block.beschrLoonweek : null;
        const text = bl ? getBeschrijving(code, bl.isoYear, bl.week, bl.maandNaam) : '';
        span.textContent = text;
        span.setAttribute('data-copy-value', text);
      });
    }

    function formatTotaalDisplay(value) {
      return String(value || '').replace(/^EUR\s*/i, '€ ').trim();
    }

    function totaalCopyValue(value) {
      // Kopieerwaarde met punt als decimaalteken (geen duizendtalscheiding),
      // zodat het bedrag plakbaar is; de weergave op het scherm houdt de komma.
      return parseTotaalNumber(value).toFixed(2);
    }

    function aantalCopyValue(value) {
      // Kopieerwaarde met punt als decimaalteken i.p.v. komma.
      const num = parseFloat(String(value == null ? '' : value).replace(',', '.'));
      return Number.isFinite(num) ? String(num) : String(value == null ? '' : value);
    }

    function parseTotaalNumber(value) {
      const cleaned = String(value || '').replace(/^EUR\s*/i, '').trim();
      const normalized = cleaned.replace(/\./g, '').replace(',', '.');
      const num = parseFloat(normalized);
      return Number.isFinite(num) ? num : 0;
    }

    function formatEuro(num) {
      return '€ ' + num.toLocaleString('nl-BE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Aantal producten voor de controle-tabel (Samenstelling per JobID): het echte geleverde
    // aantal (ProductAantal = ext.Quantity in Ultimo). Valt terug op het facturatie-Aantal
    // zolang de WFL het veld nog niet meestuurt, zodat de pagina blijft werken vóór de deploy.
    function productAantalValue(job) {
      const raw = job.ProductAantal;
      return (raw == null || String(raw).trim() === '') ? job.Aantal : raw;
    }

    // Eenheidsprijs = Totaal / aantal producten, afgeleid zodat hij altijd klopt met het
    // getoonde totaal. Bij aantal 0 of onbekend: leeg.
    function eenheidsprijsDisplay(job) {
      const aantal = parseFloat(String(productAantalValue(job) ?? '').replace(',', '.'));
      if (!Number.isFinite(aantal) || aantal === 0) return '';
      return formatEuro(parseTotaalNumber(job.Totaal) / aantal);
    }

    function calculateBlockTotal(block) {
      let sum = 0;
      for (const jobsInCode of block.codeGroups.values()) {
        for (const job of jobsInCode) {
          sum += parseTotaalNumber(job.Totaal);
        }
      }
      return formatEuro(sum);
    }

    function setupBuildingFilter() {
      const sel = document.getElementById('building-filter');
      const wrap = document.getElementById('building-filter-wrap');
      if (!sel || !wrap) return;

      const buildings = Array.from(new Set(buildingGroups.map(b => b.building)))
        .sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true }));

      const current = sel.value;
      sel.innerHTML = '<option value="">Alle gebouwen</option>'
        + buildings.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
      // Behoud de selectie als het gebouw nog bestaat.
      if (buildings.includes(current)) sel.value = current;

      if (!sel.dataset.bound) {
        sel.addEventListener('change', applyBuildingFilter);
        sel.dataset.bound = '1';
      }
      wrap.style.display = buildingGroups.length ? 'block' : 'none';
      applyBuildingFilter();
    }

    function applyBuildingFilter() {
      const sel = document.getElementById('building-filter');
      const chosen = sel ? sel.value : '';
      for (const block of buildingGroups) {
        const show = !chosen || block.building === chosen;
        document.querySelectorAll(`tr[data-blockkey="${cssEscape(block.blockKey)}"]`).forEach((row) => {
          // Detailrijen (Per JobID) blijven verborgen tenzij ze al open stonden; we togglen enkel niet-detailrijen.
          if (row.classList.contains('jobid-detail-row')) {
            if (!show) row.style.display = 'none';
            return;
          }
          row.style.display = show ? '' : 'none';
        });
      }
    }

    function updateGrandTotal() {
      const el = document.getElementById('grand-total');
      const valueEl = document.getElementById('grand-total-value');
      if (!el || !valueEl) return;

      let sum = 0;
      for (const block of buildingGroups) {
        for (const jobsInCode of block.codeGroups.values()) {
          for (const job of jobsInCode) {
            sum += parseTotaalNumber(job.Totaal);
          }
        }
      }

      valueEl.textContent = formatEuro(sum);
      el.style.display = buildingGroups.length ? 'block' : 'none';
    }

    function copyPart(displayText, copyValue) {
      return `<span class="copy-part" data-copy-value="${escapeHtml(copyValue)}">${escapeHtml(displayText)}</span>`;
    }

    function renderCodeCell(code) {
      const trimmed = String(code || '').trim();

      const blLaMatch = trimmed.match(/^BL\s*(\d+)\s*-\s*LA\s*(\d+)$/i);
      if (blLaMatch) {
        return `BL ${copyPart(blLaMatch[1], blLaMatch[1])} - LA ${copyPart(blLaMatch[2], blLaMatch[2])}`;
      }

      const pMatch = trimmed.match(/^P\s+(.+)$/i);
      if (pMatch) {
        return `P ${copyPart(pMatch[1], pMatch[1])}`;
      }

      return trimmed ? copyPart(trimmed, trimmed) : '';
    }

    function mergeJobsByWO(jobsInCode, code) {
      const isBl2La2 = String(code || '').trim() === 'BL 2 - LA 2';
      const byWO = new Map();

      for (const job of jobsInCode) {
        const wo = String(job.WO || '').trim();
        if (!byWO.has(wo)) {
          byWO.set(wo, { ...job, jobIds: [String(job.JobId || '').trim()], aantalSum: 0, totaalSum: 0 });
        }
        const merged = byWO.get(wo);
        if (!merged.jobIds.includes(String(job.JobId || '').trim())) {
          merged.jobIds.push(String(job.JobId || '').trim());
        }
        merged.aantalSum += parseFloat(String(job.Aantal || '0').replace(',', '.')) || 0;
        merged.totaalSum += parseTotaalNumber(job.Totaal);
      }

      return Array.from(byWO.values()).map((merged) => ({
        ...merged,
        JobId: merged.jobIds[0],
        // BL 2 - LA 2 is een vast forfait per lijn (geen echte telbare hoeveelheid) - Aantal
        // blijft altijd 1, ook na samenvoegen. Enkel het Totaal (bedrag) telt op.
        Aantal: isBl2La2 ? '1' : String(merged.aantalSum).replace('.', ','),
        Totaal: formatEuro(merged.totaalSum).replace('€ ', 'EUR '),
      }));
    }

    // Ongesamenvoegde lijst per JobID — puur ter raadpleging, zodat de gebruiker de
    // samenstelling van een opgeteld bedrag (per WO/code) kan controleren bij twijfel.
    // Verandert niets aan de bestaande, samengevoegde weergave of aan de verwerklogica.
    function renderJobIdBreakdown(block) {
      const lines = [];
      for (const [code, jobsInCode] of block.codeGroups.entries()) {
        for (const job of jobsInCode) {
          lines.push({ code, ...job });
        }
      }
      lines.sort((a, b) =>
        String(a.JobId || '').localeCompare(String(b.JobId || ''), undefined, { numeric: true }) ||
        String(a.WO || '').localeCompare(String(b.WO || ''), undefined, { numeric: true })
      );

      let prevJob = null;
      let shade = 1;
      const body = lines.map((j) => {
        const jobId = String(j.JobId || '').trim();
        // Wissel van tint telkens het JobID verandert, zodat regels van dezelfde job
        // samen één blok vormen en verschillende jobs visueel gescheiden zijn.
        const isNewJob = jobId !== prevJob;
        if (isNewJob) { shade = 1 - shade; prevJob = jobId; }
        const rowClass = `${shade === 0 ? 'jid-a' : 'jid-b'}${isNewJob ? ' jid-start' : ''}`;
        return `
          <tr class="${rowClass}">
            <td>${isNewJob ? escapeHtml(jobId) : ''}</td>
            <td>${escapeHtml(j.ProjectNr)}</td>
            <td>${escapeHtml(j.WO)}</td>
            <td>${escapeHtml(String(j.code || '').trim())}</td>
            <td>${escapeHtml(j.Beschrijving)}</td>
            <td class="num-right">${escapeHtml(formatAantal(j.Aantal))}</td>
            <td class="num-right">${escapeHtml(formatAantal(productAantalValue(j)))}</td>
            <td class="num-right">${escapeHtml(eenheidsprijsDisplay(j))}</td>
            <td class="num-right">${escapeHtml(formatTotaalDisplay(j.Totaal))}</td>
          </tr>`;
      }).join('');

      return `
        <tr class="jobid-detail-row" data-blockkey="${escapeHtml(block.blockKey)}" style="display:none">
          <td colspan="7">
            <div class="jobid-detail-title">Samenstelling per JobID — ${escapeHtml(block.building)} · ${escapeHtml(block.loonweekLabel)} (${lines.length} lijn${lines.length !== 1 ? 'en' : ''})</div>
            <table class="jobid-detail-table">
              <thead>
                <tr><th>JobID</th><th>ProjectNr</th><th>WO</th><th>Code</th><th>Beschrijving</th><th class="num-right">Aantal (fac.)</th><th class="num-right">Aantal producten</th><th class="num-right">Eenheidsprijs</th><th class="num-right">Totaal</th></tr>
              </thead>
              <tbody>${body}</tbody>
            </table>
          </td>
        </tr>`;
    }

    function renderBuildings() {
      const container = document.getElementById('buildings-container');
      container.innerHTML = '';

      if (!buildingGroups.length) {
        container.innerHTML = '<p>Geen jobs klaar om te factureren.</p>';
        updateGrandTotal();
        setupBuildingFilter();
        return;
      }

      const table = document.createElement('table');
      table.className = 'building-table';
      table.id = 'all-buildings-table';

      let rowsHtml = `
        <colgroup>
          <col style="width:8%">
          <col style="width:5%">
          <col style="width:7%">
          <col style="width:11%">
          <col style="width:15%">
          <col style="width:50%">
          <col style="width:4%">
        </colgroup>
        <tbody>
      `;

      for (const block of buildingGroups) {
        const blockId = blockIdFor(block.blockKey);
        const bk = escapeHtml(block.blockKey);
        const headLabel = `${escapeHtml(block.building)} &middot; ${block.processable ? '' : '⚠️ '}${escapeHtml(block.loonweekLabel)}`;

        const controlsCell = block.processable
          ? `<td colspan="2" class="vordering-cell">
               <span class="copy-part loonweek-chip" data-copy-value="${escapeHtml(block.loonweekShort)}">${escapeHtml(block.loonweekShort)}</span>
               <input type="text" class="vorderingsnummer-input" placeholder="00000" maxlength="5" inputmode="numeric" pattern="\d{5}" data-blockkey="${bk}" />
               <button type="button" class="btn btn-primary btn-process" data-blockkey="${bk}" disabled>Verwerk</button>
             </td>`
          : `<td colspan="2" class="vordering-cell"><span class="job-error">Datum ontbreekt — vul ScheduledStartDate in Ultimo in.</span></td>`;

        rowsHtml += `
          <tr class="building-header${block.processable ? '' : ' done'}" id="${blockId}" data-blockkey="${bk}">
            <td colspan="3"><div class="building-head-cell">${headLabel}<button type="button" class="btn-jobid-toggle" data-blockkey="${bk}">🔍 Per JobID</button></div></td>
            <td class="num-right"><span class="building-total" data-total-for="${bk}">${escapeHtml(calculateBlockTotal(block))}</span></td>
            <td>${block.externalId ? copyPart(block.externalId, block.externalId) : ''}</td>
            ${controlsCell}
          </tr>
          <tr class="column-header-row" data-blockkey="${bk}">
            <th>ProjectNr</th><th>WO</th><th class="num-right">Aantal</th><th class="num-right">Totaal</th><th>Code</th><th>Beschrijving</th><th></th>
          </tr>
        `;

        for (const [code, jobsInCode] of block.codeGroups.entries()) {
          const mergedRows = mergeJobsByWO(jobsInCode, code);
          mergedRows.forEach((job, idx) => {
            const jobId = String(job.JobId || '').trim();
            const isBl2La2 = String(code || '').trim() === 'BL 2 - LA 2';
            rowsHtml += `
              <tr class="job-row" data-blockkey="${bk}" data-jobid="${escapeHtml(jobId)}">
                <td class="${idx === 0 ? 'code-group-start' : ''}">${escapeHtml(job.ProjectNr)}</td>
                <td>${escapeHtml(job.WO)}</td>
                <td class="num-right">${copyPart(formatAantal(job.Aantal), aantalCopyValue(job.Aantal))}</td>
                <td class="num-right">${isBl2La2 ? copyPart(formatTotaalDisplay(job.Totaal), totaalCopyValue(job.Totaal)) : escapeHtml(formatTotaalDisplay(job.Totaal))}</td>
                <td>${renderCodeCell(code)}</td>
                <td>${isBl2La2 ? `<span class="copy-part beschrijving-part" data-blockkey="${bk}" data-code="${escapeHtml(code)}" data-copy-value=""></span>` : ''}</td>
                <td>
                  ${block.processable ? `<input type="checkbox" class="job-checkbox" data-blockkey="${bk}" data-jobid="${escapeHtml(jobId)}" checked />` : ''}
                </td>
              </tr>
            `;
          });
        }

        rowsHtml += renderJobIdBreakdown(block);
      }

      rowsHtml += `</tbody>`;
      table.innerHTML = rowsHtml;
      container.appendChild(table);

      updateGrandTotal();
      setupBuildingFilter();
      updateBeschrijvingen();
      attachBuildingHandlers();
    }

    // Jobs met een 00633-lijn (nacalculatie, kost nog niet gekend) worden door de backend niet
    // in de te factureren lijst gezet, maar apart aangeleverd. Ze tellen dus niet mee in de
    // totalen; we tonen ze hier onderaan enkel ter info zodat ze niet 'verloren' lijken.
    function renderPending() {
      const container = document.getElementById('pending-container');
      if (!container) return;
      container.innerHTML = '';

      if (!pendingJobs.length) return;

      // Ontdubbel op JobId (een job kan meerdere 00633-lijnen hebben).
      const seen = new Set();
      const uniqueJobs = [];
      for (const job of pendingJobs) {
        const jid = String(job.JobId || '').trim();
        if (jid && seen.has(jid)) continue;
        if (jid) seen.add(jid);
        uniqueJobs.push(job);
      }

      const rows = uniqueJobs.map((job) => `
        <tr>
          <td>${escapeHtml(String(job.JobId || '').trim())}</td>
          <td>${escapeHtml(String(job.Building || '').trim())}</td>
          <td>${escapeHtml(String(job.ProjectNr || '').trim())}</td>
          <td>${escapeHtml(String(job.WO || '').trim())}</td>
        </tr>
      `).join('');

      const section = document.createElement('div');
      section.className = 'pending-section';
      section.innerHTML = `
        <h2>⏳ Blijft hangen — kost nog niet gekend (${uniqueJobs.length})</h2>
        <p class="pending-intro">Deze job(s) bevatten een lijn met artikel 00633 (nacalculatie): de taak is uitgevoerd en geaccepteerd, maar de kost is nog niet gekend. Ze worden <strong>niet</strong> meegerekend in de facturatie hierboven en blijven staan tot de kost gekend is.</p>
        <table class="pending-table">
          <thead>
            <tr><th>JobID</th><th>Gebouw</th><th>ProjectNr</th><th>WO</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      container.appendChild(section);
    }

    function attachBuildingHandlers() {
      document.querySelectorAll('.vorderingsnummer-input, .job-checkbox').forEach((el) => {
        el.addEventListener('input', updateProcessButtonState);
        el.addEventListener('change', updateProcessButtonState);
      });

      document.querySelectorAll('.btn-process').forEach((btn) => {
        btn.addEventListener('click', () => processBlock(btn.getAttribute('data-blockkey')));
      });

      document.querySelectorAll('span.copy-part').forEach((part) => {
        part.addEventListener('click', () => copyValueToClipboard(part));
      });

      document.querySelectorAll('.btn-jobid-toggle').forEach((btn) => {
        btn.addEventListener('click', () => toggleJobIdDetail(btn.getAttribute('data-blockkey'), btn));
      });
    }

    async function copyValueToClipboard(part) {
      const text = part.getAttribute('data-copy-value') || '';
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        return;
      }

      part.classList.add('copied-flash');
      setTimeout(() => part.classList.remove('copied-flash'), 400);
    }

    async function processBlock(blockKey) {
      const block = buildingGroups.find(b => b.blockKey === blockKey);
      if (!block || !block.processable) return;

      const input = document.querySelector(`.vorderingsnummer-input[data-blockkey="${cssEscape(blockKey)}"]`);
      const button = document.querySelector(`.btn-process[data-blockkey="${cssEscape(blockKey)}"]`);
      const vorderingsnummer = String(input.value || '').trim();

      // Alle jobs/lijnen van dit blok worden altijd samen verwerkt. Eén job kan meerdere
      // lijnen hebben; die mogen nooit los verwerkt worden.
      const allJobIds = [];
      for (const jobsInCode of block.codeGroups.values()) {
        for (const job of jobsInCode) {
          const jid = String(job.JobId || '').trim();
          if (jid && !allJobIds.includes(jid)) allJobIds.push(jid);
        }
      }
      if (!allJobIds.length) return;

      document.querySelectorAll(`tr.job-error-row[data-blockkey="${cssEscape(blockKey)}"]`).forEach(el => el.remove());

      if (!/^\d{5}$/.test(vorderingsnummer)) {
        const headerRow = document.getElementById(blockIdFor(blockKey));
        if (headerRow) {
          const errorRow = document.createElement('tr');
          errorRow.className = 'job-error-row';
          errorRow.setAttribute('data-blockkey', blockKey);
          errorRow.innerHTML = `<td colspan="7" class="job-error">⚠️ Vorderingsnummer moet exact 5 cijfers zijn (bv. 00006).</td>`;
          headerRow.after(errorRow);
        }
        return;
      }

      const confirmed = window.confirm(
        `Vorderingsnummer ${vorderingsnummer} toekennen aan ALLE ${allJobIds.length} job(s) van "${block.building} · ${block.loonweekLabel}"?`
      );
      if (!confirmed) return;

      button.disabled = true;
      button.textContent = 'Bezig...';

      try {
        const data = await apiFetch('SET_VORDERING', {
          method: 'POST',
          body: { jobIds: allJobIds, vorderingsnummer },
        });

        const results = data.Results || [];
        const succeededIds = new Set(results.filter(r => r.Success).map(r => String(r.JobId)));
        const failedResults = results.filter(r => !r.Success);

        // Geslaagde jobs zijn klaar: verwijder al hun rijen binnen dit blok (een job kan meerdere lijnen hebben)
        succeededIds.forEach((jobId) => {
          document.querySelectorAll(`tr.job-row[data-blockkey="${cssEscape(blockKey)}"][data-jobid="${cssEscape(jobId)}"]`).forEach((row) => row.remove());
          for (const jobsInCode of block.codeGroups.values()) {
            for (let i = jobsInCode.length - 1; i >= 0; i--) {
              if (String(jobsInCode[i].JobId || '').trim() === jobId) jobsInCode.splice(i, 1);
            }
          }
        });

        const totalSpan = document.querySelector(`span.building-total[data-total-for="${cssEscape(blockKey)}"]`);
        if (totalSpan) totalSpan.textContent = calculateBlockTotal(block);
        updateGrandTotal();

        // Toon een foutmelding onder elke mislukte rij, laat de checkbox staan zodat retry kan
        failedResults.forEach(({ JobId, Message }) => {
          const row = document.querySelector(`tr.job-row[data-blockkey="${cssEscape(blockKey)}"][data-jobid="${cssEscape(String(JobId))}"]`);
          if (row) {
            const errorRow = document.createElement('tr');
            errorRow.className = 'job-error-row';
            errorRow.setAttribute('data-blockkey', blockKey);
            errorRow.innerHTML = `<td colspan="6" class="job-error">❌ ${escapeHtml(Message || 'Onbekende fout')}</td><td></td>`;
            row.after(errorRow);
          }
        });

        const remaining = document.querySelectorAll(`.job-checkbox[data-blockkey="${cssEscape(blockKey)}"]`).length;
        if (remaining === 0) {
          // Niets meer in dit blok: verwijder alle rijen van het blok (balk, kolomkop, detailtabel)
          document.querySelectorAll(`tr[data-blockkey="${cssEscape(blockKey)}"]`).forEach(el => el.remove());
          buildingGroups = buildingGroups.filter(b => b.blockKey !== blockKey);
          if (!buildingGroups.length) renderBuildings();
          return;
        }

        button.textContent = 'Verwerk';
      } catch (err) {
        if (err.message === 'UNAUTHORIZED') return;
        button.textContent = 'Verwerk';
        const headerRow = document.getElementById(blockIdFor(blockKey));
        if (headerRow) {
          const errorRow = document.createElement('tr');
          errorRow.className = 'job-error-row';
          errorRow.setAttribute('data-blockkey', blockKey);
          errorRow.innerHTML = `<td colspan="7" class="job-error">Netwerkfout: ${escapeHtml(err.message)}</td>`;
          headerRow.after(errorRow);
        }
      } finally {
        updateProcessButtonState();
      }
    }

    function sanitizeKey(s) {
      return String(s).replace(/[^a-zA-Z0-9]/g, '_');
    }
    function blockIdFor(blockKey) {
      return `blk-${sanitizeKey(blockKey)}`;
    }

    function updateProcessButtonState() {
      for (const block of buildingGroups) {
        if (!block.processable) continue;
        const input = document.querySelector(`.vorderingsnummer-input[data-blockkey="${cssEscape(block.blockKey)}"]`);
        const button = document.querySelector(`.btn-process[data-blockkey="${cssEscape(block.blockKey)}"]`);
        if (!input || !button) continue;
        button.disabled = String(input.value || '').trim().length === 0;
      }
    }

    function cssEscape(s) {
      return String(s).replace(/["\\]/g, '\\$&');
    }

    function toggleJobIdDetail(blockKey, btn) {
      const row = document.querySelector(`tr.jobid-detail-row[data-blockkey="${cssEscape(blockKey)}"]`);
      if (!row) return;
      const willOpen = row.style.display === 'none';
      if (willOpen) {
        // Accordion: klap eerst alle andere open detaillijsten dicht, zodat er
        // steeds maar één gebouw tegelijk uitgeklapt is.
        document.querySelectorAll('tr.jobid-detail-row').forEach((r) => { r.style.display = 'none'; });
        document.querySelectorAll('.btn-jobid-toggle').forEach((b) => { b.textContent = '🔍 Per JobID'; });
      }
      row.style.display = willOpen ? '' : 'none';
      if (btn) btn.textContent = willOpen ? '🔽 Verberg JobID' : '🔍 Per JobID';
    }

    async function loadList() {
      const status = document.getElementById('load-status');
      status.textContent = 'Bezig met laden...';
      status.classList.remove('error');

      try {
        const data = await apiFetch('LIST_TO_INVOICE');
        buildingGroups = groupJobs(data.Jobs || []);
        pendingJobs = data.PendingJobs || [];
        renderBuildings();
        renderPending();
        const pendingCount = new Set(pendingJobs.map(j => String(j.JobId || '').trim()).filter(Boolean)).size;
        const pendingNote = pendingCount ? `, ${pendingCount} blijft hangen (00633)` : '';
        status.textContent = `${data.Jobs.length} job(s) geladen, ${buildingGroups.length} gebouw(en)${pendingNote}.`;
      } catch (err) {
        if (err.message === 'UNAUTHORIZED') return;
        status.textContent = `Fout bij laden: ${err.message}`;
        status.classList.add('error');
      }
    }

    document.getElementById('btn-load').onclick = loadList;
  </script>
</body>
</html>
