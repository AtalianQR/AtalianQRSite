  <script type="module">
  
/* ==================== GPS helpers (VERPLICHT vanuit PortalSelf) ==================== */


  
  
  // Fix dubbele '?' in query (maakt van de tweede '?' een '&')
  // MOET helemaal bovenaan staan, vóór URLSearchParams wordt gebruikt.
  (function fixDoubleQuestionMark(){
    const href = String(location.href);
    const first = href.indexOf('?');
    const second = href.indexOf('?', first + 1);
    if (second !== -1) {
      const fixed = href.slice(0, second) + '&' + href.slice(second + 1);
      location.replace(fixed); // herlaadt netjes met correcte query
    }
  })();

	(function canonicalizeVendorRoutes(){
	  const p = String(location.pathname || '');
	  // force: /vendor i.p.v. /vendor.html
	  if (p.endsWith('/vendor.html')) {
		location.replace('/vendor' + location.search + location.hash);
	  }
	})();


  // QS (één keer!)
  const qs = new URLSearchParams(window.location.search);

  // Oorsprong van melding (portalself) via src=
  const srcRaw = qs.get('src') ?? '';

  function safeSameOriginUrl(raw) {
    if (!raw) return '';
    try {
      const u = new URL(raw, window.location.origin);
      return (u.origin === window.location.origin) ? u.toString() : '';
    } catch {
      return '';
    }
  }

  const sourceUrl = safeSameOriginUrl(srcRaw);
  const cameFromPortalSelf = !!sourceUrl && /portalself/i.test(sourceUrl);

  function goBackAfterVendor(){
    if (sourceUrl) {
      window.location.href = sourceUrl;
    } else {
      // fallback: zet hier je "basis QR" startpagina als je die hebt
      window.location.href = '/';
    }
  }
  
// ✅ LOCALHOST detect (voor bypass)
function isLocalhostHost() {
  const h = String(location.hostname || '').toLowerCase();
  return h === 'localhost' || h === '127.0.0.1' || h === '::1';
}

// Geoloc ophalen met timeout
function getGeoFix({ timeoutMs = 8000, enableHighAccuracy = true } = {}) {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ ok:false, reason:'UNSUPPORTED', message:'geolocation not available' });
      return;
    }

    let done = false;
    const timer = setTimeout(() => {
      if (done) return;
      done = true;
      resolve({ ok:false, reason:'TIMEOUT', message:`timeout ${timeoutMs}ms` });
    }, timeoutMs);

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        resolve({
          ok: true,
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: Math.round(pos.coords.accuracy || 0),
          ts: pos.timestamp || Date.now()
        });
      },
      (err) => {
        if (done) return;
        done = true;
        clearTimeout(timer);

        // ERR codes: 1 PERMISSION_DENIED, 2 POSITION_UNAVAILABLE, 3 TIMEOUT
        const code = err?.code;
        const reason =
          code === 1 ? 'DENIED' :
          code === 2 ? 'UNAVAILABLE' :
          code === 3 ? 'TIMEOUT' :
          'ERROR';

        resolve({ ok:false, reason, message: err?.message || '' });
      },
      { enableHighAccuracy, timeout: timeoutMs, maximumAge: 0 }
    );
  });
}

// Plain GPS-lijn (géén HTML)
function formatGpsLinePlain(geo){
  return `GPS: lat=${geo.lat}; lon=${geo.lon}; acc=${geo.acc}m; ts=${new Date(geo.ts).toISOString()}`;
}

/**
 * Haalt GPS op als het verplicht is (PortalSelf), met localhost-bypass.
 * - Als geo faalt: STOP + uitleg + retry
 * - BYPASS enkel op localhost (duidelijk gemarkeerd)
 */
async function requireGpsIfPortalSelf({ botui, Telemetry, isFr, cameFromPortalSelf }){
  if (!cameFromPortalSelf) return { ok:true, skipped:true };

  if (isLocalhostHost()) {
    return { ok:true, bypass:true, lat:0, lon:0, acc:0, ts:Date.now(), reason:'LOCALHOST_BYPASS' };
  }

  await botui.message.add({ content: isFr ? '📍 Localisation…' : '📍 Locatie ophalen…' });
  const geo = await getGeoFix({ timeoutMs: 8000, enableHighAccuracy: true });
  if (geo.ok) return geo;

  Telemetry?.send?.('gps_required_block_vendor', { reason: geo.reason, message: geo.message || '' });

  await botui.message.add({
    type:'html',
    content: isFr
      ? `❌ <b>Localisation GPS requise</b>.<br>Activez la localisation (GPS) et autorisez ce site.<br>Ensuite, réessayez.`
      : `❌ <b>GPS is verplicht</b>.<br>Zet je locatie (GPS) aan en geef toestemming voor deze site.<br>Probeer daarna opnieuw.`
  });

  await botui.action.button({ action: [{ text: isFr ? '🔄 Réessayer' : '🔄 Opnieuw proberen', value:'retry' }] });

  return await requireGpsIfPortalSelf({ botui, Telemetry, isFr, cameFromPortalSelf });
}


    

  /* ==================== QS & ENV ==================== */
  const host = (window.location && window.location.host) ? window.location.host : '';
  const isTest =
    qs.has('test') ||              // ?test=1 of iets anders
    qs.get('env') === 'test' ||    // ?env=test
    /test|staging/i.test(host);    // host met 'test' of 'staging'

  const envQ = isTest ? '&test=1' : '';
  if (isTest) {
    const showBanner = () => {
      const $ti = document.getElementById('test-indicator');
      if ($ti) $ti.style.display = 'block';
      document.body.classList.add('is-test');
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showBanner);
    } else {
      showBanner();
    }
  }

  /* ==================== 0. Endpoints ==================== */
  const endpointJobDetails = '/.netlify/functions/jobsvendor';
  const endpointUpdate     = endpointJobDetails;

  /* ==================== 1. Parameters ==================== */
  const jobIdRaw = qs.get('job') || qs.get('jobId') || '';
  const jobId = String(jobIdRaw).split(/[?&#]/)[0];
  let   lang  = qs.get('lang') || ((navigator.language||'').startsWith('fr') ? 'fr' : 'nl');
  const isFr  = (lang === 'fr');
  if (isFr) document.body.style.backgroundImage = "url('/afmeldentaak_fr.png')";

  /* ==================== 2. Telemetrie ==================== */
  const Telemetry = (()=>{ 
    const base = { jobId: String(jobId), lang, env: isTest ? 'test' : 'prod', cameFromPortalSelf };
    async function send(type, extra={}){
      const json = JSON.stringify({ type, ts: Date.now(), href: location.href, ...base, ...extra });
      try{
        if (navigator.sendBeacon && navigator.sendBeacon('/.netlify/functions/formlog', new Blob([json],{type:'application/json'}))) return;
        await fetch('/.netlify/functions/formlog',{ method:'POST', headers:{'content-type':'application/json'}, body: json, keepalive:true });
      }catch{}
    }
    return { send };
  })();
  Telemetry.send('vendor_html_load');

  /* ==================== 3. UI/DOM ==================== */
  const botui = new BotUI('botui-app');
  const elInfo = document.getElementById('job-info');
  document.getElementById('switch-nl').onclick = ()=>{const u=new URL(location.href);u.searchParams.set('lang','nl');location.href=u;};
  document.getElementById('switch-fr').onclick = ()=>{const u=new URL(location.href);u.searchParams.set('lang','fr');location.href=u;};

  let sessionEmail = '';
  let jobPayload   = null;
  let documentCache = {};
  let isUploading   = false;
  let hasJobDocuments = false;

  const $panel    = document.getElementById('doc-panel');
  const $backdrop = document.getElementById('doc-backdrop');
  const $fab      = document.getElementById('doc-fab');
  let fabShown = false;
  function revealFab(){
    if (fabShown) return;
    $fab.style.display = 'flex';
    $fab.removeAttribute('aria-hidden');
    $fab.removeAttribute('tabindex');
    fabShown = true;
  }
  const $close    = document.getElementById('doc-panel-close');
  const $preview  = document.getElementById('doc-preview');
  const $title    = document.getElementById('doc-panel-title');

  $fab.textContent = isFr ? '📎 Documents' : '📎 Documenten';

  function openDocPanel(){
    $panel.classList.add('open');
    $panel.setAttribute('aria-hidden','false');
    $backdrop.hidden=false; requestAnimationFrame(()=>{$backdrop.style.opacity=1});
  }
  function closeDocPanel(){
    $panel.classList.remove('open');
    $panel.setAttribute('aria-hidden','true');
    $backdrop.style.opacity=0; setTimeout(()=>{$backdrop.hidden=true},180);
  }
  $fab.addEventListener('click', async ()=>{ openDocPanel(); await loadAndRenderDocuments(jobId).catch(console.error); });
  $close.addEventListener('click', closeDocPanel);
  $backdrop.addEventListener('click', closeDocPanel);

  /* ==================== 4. Helpers ==================== */
  const stripHtml=(s='')=>s.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').replace(/\s{2,}/g,' ').trim();
  function formatIsoToLocal(iso){try{const d=new Date(iso);if(isNaN(d.getTime())) return isFr?'Date non valide':'Invalid Date'; return d.toLocaleString()}catch{ return iso||(isFr?'Date non valide':'Invalid Date') } }



  async function fetchJobDocuments(jobId){
    const url = `${endpointJobDetails}?action=LIST_JOB_DOCS&jobId=${encodeURIComponent(jobId)}${envQ}`;
    const r=await fetch(url,{headers:{accept:'application/json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    return Array.isArray(data?.Documents)?data.Documents:[];
  }

  async function fetchDocumentBase64(docId){
    const url = `${endpointJobDetails}?action=GET_JOB_DOC&docId=${encodeURIComponent(docId)}${envQ}`;
    const r=await fetch(url,{headers:{accept:'application/json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const b64 = (typeof data === 'string') ? data : (data?.Document || data?.Base64 || '');
    if(!b64 || typeof b64!=='string') throw new Error(isFr?'Données du document introuvables.':'Documentdata niet gevonden.');
    return b64;
  }

	function getMimeType(docType, description, base64Data){
	  const t = (docType || '').toUpperCase().trim();

	  if (t === 'PDF') return 'application/pdf';
	  if (t === 'JPEG' || t === 'JPG') return 'image/jpeg';
	  if (t === 'PNG') return 'image/png';
	  if (t === 'EML') return 'message/rfc822';
	  if (t === 'MSG') return 'application/vnd.ms-outlook';

	  const desc = (description || '').toLowerCase().trim();
	  if (desc.endsWith('.pdf')) return 'application/pdf';
	  if (desc.endsWith('.jpg') || desc.endsWith('.jpeg')) return 'image/jpeg';
	  if (desc.endsWith('.png')) return 'image/png';
	  if (desc.endsWith('.eml')) return 'message/rfc822';
	  if (desc.endsWith('.msg')) return 'application/vnd.ms-outlook';
	  if (desc.endsWith('.doc') || desc.endsWith('.docx')) return 'application/msword';
	  if (desc.endsWith('.xls') || desc.endsWith('.xlsx')) return 'application/vnd.ms-excel';

	  if (base64Data && base64Data.length > 16) {
		const prefix = base64Data.substring(0, 32);

		if (prefix.startsWith('/9j/')) return 'image/jpeg';
		if (prefix.startsWith('iVBORw0KGgo')) return 'image/png';
		if (prefix.startsWith('JVBERi0x')) return 'application/pdf';

		// EML bevat vaak leesbare mail headers in plain text/base64
		if (
		  prefix.startsWith('RnJvbTog') ||      // "From: "
		  prefix.startsWith('TUlNRS1WZXJzaW9uOi') || // "MIME-Version:"
		  prefix.startsWith('UmVjZWl2ZWQ6')      // "Received:"
		) {
		  return 'message/rfc822';
		}

		// MSG / Outlook OLE Compound File
		if (prefix.startsWith('0M8R4KGxGuE')) {
		  return 'application/vnd.ms-outlook';
		}
	  }

	  return 'application/octet-stream';
	}

				<p><a href="${dataUrl}" target="_blank" download="${fileName.endsWith('.eml') ? fileName : fileName + '.eml'}" style="display:inline-block;padding:8px 14px;background:#EE7E00;color:#fff;text-decoration:none;border-radius:6px;font-weight:700">EML downloaden</a></p>`;

				<p><a href="${dataUrl}" target="_blank" download="${fileName.endsWith('.msg') ? fileName : fileName + '.msg'}" style="display:inline-block;padding:8px 14px;background:#EE7E00;color:#fff;text-decoration:none;border-radius:6px;font-weight:700">MSG downloaden</a></p>`;

	  } else {
		html = `<p style="color:#b91c1c">Niet-ondersteund type (${mimeType}).</p>
				<p><a href="${dataUrl}" target="_blank" download="${fileName}" style="color:#EE7E00;font-weight:700">Origineel downloaden</a></p>`;
	  }

	  $preview.innerHTML = html;

async function askSignaturePad() {
  return new Promise(async (resolve) => {
    const id = `sig-${Date.now()}`;

    await botui.message.add({
      type: 'html',
      content: `
		  <div class="signature-wrapper">
			<canvas id="${id}" class="signature-canvas"></canvas>
			<div class="signature-actions">
			  <button type="button" id="${id}-clear">
				${isFr ? 'Effacer' : 'Wissen'}
			  </button>
			  <button type="button" id="${id}-ok">
				${isFr ? 'Confirmer' : 'Bevestigen'}
			  </button>
			</div>
		  </div>
		`
    });

    const canvas = document.getElementById(id);
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;

    const ctx = canvas.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false;
    let hasDrawn = false;

    function pos(e) {
      const r = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - r.left, y: p.clientY - r.top };
    }

    function start(e) {
      e.preventDefault();
      drawing = true;
      hasDrawn = true;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = pos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function end() {
      drawing = false;
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);

	const clearBtn = document.getElementById(`${id}-clear`);
	const okBtn = document.getElementById(`${id}-ok`);

	let signatureConfirmed = false;

	clearBtn.onclick = () => {
	  if (signatureConfirmed) return;

	  ctx.clearRect(0, 0, rect.width, rect.height);
	  hasDrawn = false;
	};

	okBtn.onclick = async () => {
	  if (signatureConfirmed) return;

	  if (!hasDrawn) {
		await botui.message.add({
		  content: isFr ? '⚠️ Signature obligatoire.' : '⚠️ Handtekening is verplicht.'
		});
		return;
	  }

	  signatureConfirmed = true;

	  clearBtn.disabled = true;
	  okBtn.disabled = true;
	  okBtn.textContent = isFr ? 'Confirmé' : 'Bevestigd';

	  clearBtn.style.opacity = '.45';
	  okBtn.style.opacity = '.45';
	  clearBtn.style.cursor = 'not-allowed';
	  okBtn.style.cursor = 'not-allowed';

	  canvas.style.pointerEvents = 'none';
	  canvas.style.opacity = '.85';

	  resolve(canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, ''));
	};
  });
}

	async function menu(job, opts = {}) {

	  job.CustomerNeedsAcceptance === true ||

	const isExecuted = ps === '1016';
	const showAcceptanceButton = isExecuted && needsAcceptance;

	// 1016 zonder klantacceptatie = uitgevoerd en klaar.

	  await showExistingAcceptanceIfAny(job);

	  await botui.message.add({
		content: isFr
		  ? '✅ Cette tâche est déjà exécutée. Aucune action supplémentaire n’est possible.'
		  : '✅ Deze taak is al uitgevoerd. Er is geen verdere actie meer mogelijk.'
	  });

	  if (cameFromPortalSelf) return goBackAfterVendor();
	  return;

	if (!opts.silent && needsAcceptancePreparation(job)) {

		`

		{ text: doneText, value: 'done' },
		{ text: isFr ? '🛑 Quitter la session' : '🛑 Sessie verlaten', value: 'exit', cssClass: 'secondary-button' }

	} else {
	  menuActions = [
		{ text: isFr ? '➕ Ajouter un commentaire' : '➕ Info toevoegen', value: 'info' },
		{ text: doneText, value: 'done' },
		{ text: isFr ? '🛑 Quitter la session' : '🛑 Sessie verlaten', value: 'exit', cssClass: 'secondary-button' }

	const ans = await botui.action.button({

		if (ok) {

		if (showAcceptanceButton) {

  /* ==================== 11. Upload helpers ==================== */
  function sanitizeName(name){ return String(name||'').replace(/[^\w.\-()+ ]+/g,'_').trim() || 'upload.bin'; }
  
function guessMimeByName(name){
  const n = String(name || '').toLowerCase();
  if (n.endsWith('.jpg') || n.endsWith('.jpeg')) return 'image/jpeg';
  if (n.endsWith('.png')) return 'image/png';
  if (n.endsWith('.pdf')) return 'application/pdf';
  if (n.endsWith('.eml')) return 'message/rfc822';
  if (n.endsWith('.msg')) return 'application/vnd.ms-outlook';
  return 'application/octet-stream';
}

  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>{
        const s=String(r.result||''); const i=s.indexOf('base64,');
        res(i>0 ? s.substring(i+7) : s);
      };
      r.onerror=()=>rej(r.error||new Error('Kon bestand niet lezen'));
      r.readAsDataURL(file);
    });
  }

  async function uploadJobDocument({ file, email, jobId, descriptionOverride }) {
    if (!jobId) throw new Error('JobId ontbreekt.');
    const MAX_MB = 7;
    if (file.size > MAX_MB * 1024 * 1024) {
      throw new Error(`Bestand is groter dan ${MAX_MB} MB.`);
    }

    const originalName = sanitizeName(file.name);
    const finalName    = originalName;
    const mime         = file.type || guessMimeByName(originalName);
    const b64          = await fileToBase64(file);

    const rawDescription = (descriptionOverride || originalName);
    const cleanDesc      = stripHtml(String(rawDescription)).slice(0, 200);

    const url = `${endpointJobDetails}?action=ADD_JOB_DOC&jobId=${encodeURIComponent(jobId)}${envQ}`;

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'content-type':'application/json', 'accept':'application/json' },
      body: JSON.stringify({
        action: 'ADD_JOB_DOC',
        jobId: String(jobId),
        email: String(email || ''),
        fileName: finalName,
        mimeType: mime,
        description: cleanDesc,
        base64: b64
      })
    });

    const txt = await resp.text().catch(()=> '');
    let json = {};
    try { json = JSON.parse(txt); } catch { json = { raw: txt }; }

    if (!resp.ok) {
      const reason = json?.error || json?.message || txt || `HTTP ${resp.status}`;
      throw new Error(`Upload mislukt: ${reason}`);
    }
    return json;
  }

				<b>${isFr ? 'Acceptation client requise' : 'Klantacceptatie vereist'}</b><br>
				${
				  isFr
					? 'La déclaration de prestation est déjà préparée. Présentez maintenant le résumé au client pour contrôle et acceptation.'
					: 'De prestatieverklaring is al voorbereid. Toon nu de samenvatting aan de klant voor controle en acceptatie.'
				}
			  </div>
			`
		  });

		  await showExistingAcceptanceIfAny(job);

		  await botui.message.add({
			type: 'html',
			content: `
			  <div class="acceptance-check-box">
				${
				  isFr
					? 'Passez maintenant vers le client. Il pourra ensuite ajouter une remarque, indiquer son nom et signer.'
					: 'Ga nu naar de klant. Daarna kan de klant eventueel een opmerking toevoegen, zijn naam invullen en ondertekenen.'
				}
			  </div>
			`
		  });

		  await botui.action.button({
			action: [
			  {
				text: isFr ? '✅ Continuer avec le client' : '✅ Verdergaan met de klant',
				value: 'ok'
			  }
			]
		  });

		  await runCustomerAcceptanceOnly(job);
		  return;
		}

		await menu(job);
	  }catch(e){
		const errorDetail = String(e.message || e);
		console.error('FATALE FOUT IN FLOW:', e);

		let userMessage = isFr
		  ? '❌ Erreur: Une erreur inattendue est survenue. Veuillez réessayer plus tard.'
		  : '❌ Fout: Er is een onverwachte fout opgetreden. Probeer later opnieuw.';

		if(errorDetail.includes('HTTP')) {
		  userMessage = isFr
			? `❌ Erreur de connexion: Le chargement a échoué (Détail: ${errorDetail}).`
			: `❌ Verbindingsfout: Laden is onderbroken (Détail: ${errorDetail}).`;
		}

		await botui.message.add({ content:userMessage, type:'html', cssClass:'error-message' });
		Telemetry.send('fatal_error', { err: errorDetail });
	  }
	}


  // Idle ping
  let lastActivity=Date.now(); ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>lastActivity=Date.now(),{passive:true}));
  setInterval(()=>{ const ms=Date.now()-lastActivity; if(ms>45000){ Telemetry.send('idle',{inactiveMs:ms}); lastActivity=Date.now() } },5000);
  addEventListener('pagehide',()=>Telemetry.send('pagehide'));

  startFlow();
  </script>

  accept="image/*"
  capture="environment"
  style="display:none" />

<input
  id="doc-file-vendor"
  type="file"
  accept="application/pdf,.eml,message/rfc822,.msg,application/vnd.ms-outlook"
  style="display:none" />
