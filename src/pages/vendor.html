<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/botui/build/botui.min.css" />

  <style>
    html, body{height:auto;min-height:100vh;width:100%;margin:0;padding:0;box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;background-color:#f4f6fa;overflow-y:auto}
    body{background-image:url('/afmeldentaak.png');background-size:cover;background-repeat:no-repeat;background-position:center}
    *{box-sizing:border-box}
    /* Test-omgeving banner (zoals in portal.html) */
    .test-banner{
      position:fixed;top:0;left:0;width:100%;
      background-color:#28a745;color:#fff;text-align:center;
      padding:5px 0;font-weight:bold;z-index:1000;font-size:14px;
      text-transform:uppercase;opacity:.9
    }
    body.is-test{ padding-top:30px; } /* ruimte voor de banner */

    .header-flex{display:flex;flex-direction:column;align-items:center;max-width:600px;width:100%;margin:0 auto;padding:.5rem 0;gap:.5rem}
    img.logo{max-height:60px;height:auto;width:auto;display:block;margin:0 auto;background:rgba(255,255,255,.85);padding:.1rem;border-radius:12px}
    .header-flex .ruimte-label{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(255,255,255,.95);color:#1a202c;padding:.5rem 1rem;border-radius:12px;font-size:1rem;font-weight:500;white-space:normal;box-shadow:0 2px 6px rgba(0,0,0,.05);border:2px solid #EE7E00;box-shadow:0 2px 8px rgba(238,126,0,.06);width:100%;max-width:600px;margin:0 auto;border-bottom-width:4px}

    .lang-switch a{margin:0 .5rem;text-decoration:none;font-size:1.2rem}
    #botui-app{width:100%;max-width:600px;margin:1rem auto 0 auto;padding:.5rem 1rem 1rem}
    .botui-container{max-width:600px;width:100%;margin:0 auto;background:linear-gradient(120deg,#fff 85%,#f4f6fa 100%);border:2px solid #EE7E00;box-shadow:0 6px 32px rgba(0,0,0,.12),0 1.5px 8px rgba(238,126,0,.10);border-radius:12px;padding:1rem;box-sizing:border-box;opacity:0;animation:fadeIn 3s ease forwards}

    .meldingen-lijst{background:#f5f8fc;border-radius:10px;padding:.7em 1em;margin:.7em 0;border-left:4px solid #EE7E00}
    .job-description-box{background:#e0f2fe;border-radius:10px;padding:.7em 1em;margin:.7em 0;border-left:4px solid #3b82f6}

    @keyframes fadeIn{to{opacity:1}}

    .ruimte-label .customer { font-size: 1.25rem; font-weight: 700; color: #111827; line-height: 1.25; margin-bottom: .15rem; }
    .ruimte-label .complex  { font-size: 1rem;   font-weight: 600; color: #374151; margin-bottom: .25rem; }
    .ruimte-label .jobidline{ font-size: .9rem;  font-weight: 600; color: #1f2937; }

    .botui-actions-text-input{
      width: 100% !important;
      max-width: 80% !important;   /* kies 80–100% naar smaak */
      flex-grow: 1 !important;
    }

    .view-doc-btn{background:none;border:1px solid #EE7E00;color:#EE7E00;padding:4px 8px;cursor:pointer;font-size:.8rem;border-radius:4px;transition:background-color .1s}
    .view-doc-btn:hover{background-color:#EE7E00;color:#fff}

    .doc-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:saturate(140%) blur(1px);z-index:990;opacity:0;transition:opacity .18s ease}
    .doc-backdrop[hidden]{display:none}
    .doc-panel{position:fixed;top:0;right:0;height:100vh;width:min(560px,96vw);background:#ffffff;box-shadow:-2px 0 18px rgba(0,0,0,.18);border-left:3px solid #EE7E00;z-index:999;transform:translateX(100%);transition:transform .22s ease}

	#job-info .space { margin-top:.25rem; font-weight:600; }

  <header>

  <script src="https://cdn.jsdelivr.net/npm/botui/build/botui.min.js"></script>

  <script type="module">
  
/* ==================== GPS helpers (VERPLICHT vanuit PortalSelf) ==================== */


  
  
  // Fix dubbele '?' in query (maakt van de tweede '?' een '&')
  // MOET helemaal bovenaan staan, vóór URLSearchParams wordt gebruikt.
  (function fixDoubleQuestionMark(){
    const href = String(location.href);
    const first = href.indexOf('?');
    const second = href.indexOf('?', first + 1);
    if (second !== -1) {
      const fixed = href.slice(0, second) + '&' + href.slice(second + 1);
      location.replace(fixed); // herlaadt netjes met correcte query
    }
  })();

	(function canonicalizeVendorRoutes(){
	  const p = String(location.pathname || '');
	  // force: /vendor i.p.v. /vendor.html
	  if (p.endsWith('/vendor.html')) {
		location.replace('/vendor' + location.search + location.hash);
	  }
	})();


  // QS (één keer!)
  const qs = new URLSearchParams(window.location.search);

  // Oorsprong van melding (portalself) via src=
  const srcRaw = qs.get('src') ?? '';

  function safeSameOriginUrl(raw) {
    if (!raw) return '';
    try {
      const u = new URL(raw, window.location.origin);
      return (u.origin === window.location.origin) ? u.toString() : '';
    } catch {
      return '';
    }
  }

  const sourceUrl = safeSameOriginUrl(srcRaw);
  const cameFromPortalSelf = !!sourceUrl && /portalself/i.test(sourceUrl);

  function goBackAfterVendor(){
    if (sourceUrl) {
      window.location.href = sourceUrl;
    } else {
      // fallback: zet hier je "basis QR" startpagina als je die hebt
      window.location.href = '/';
    }
  }
  
// ✅ LOCALHOST detect (voor bypass)
function isLocalhostHost() {
  const h = String(location.hostname || '').toLowerCase();
  return h === 'localhost' || h === '127.0.0.1' || h === '::1';
}

// Geoloc ophalen met timeout
function getGeoFix({ timeoutMs = 8000, enableHighAccuracy = true } = {}) {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ ok:false, reason:'UNSUPPORTED', message:'geolocation not available' });
      return;
    }

    let done = false;
    const timer = setTimeout(() => {
      if (done) return;
      done = true;
      resolve({ ok:false, reason:'TIMEOUT', message:`timeout ${timeoutMs}ms` });
    }, timeoutMs);

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        resolve({
          ok: true,
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: Math.round(pos.coords.accuracy || 0),
          ts: pos.timestamp || Date.now()
        });
      },
      (err) => {
        if (done) return;
        done = true;
        clearTimeout(timer);

        // ERR codes: 1 PERMISSION_DENIED, 2 POSITION_UNAVAILABLE, 3 TIMEOUT
        const code = err?.code;
        const reason =
          code === 1 ? 'DENIED' :
          code === 2 ? 'UNAVAILABLE' :
          code === 3 ? 'TIMEOUT' :
          'ERROR';

        resolve({ ok:false, reason, message: err?.message || '' });
      },
      { enableHighAccuracy, timeout: timeoutMs, maximumAge: 0 }
    );
  });
}

// Plain GPS-lijn (géén HTML)
function formatGpsLinePlain(geo){
  return `GPS: lat=${geo.lat}; lon=${geo.lon}; acc=${geo.acc}m; ts=${new Date(geo.ts).toISOString()}`;
}

/**
 * Haalt GPS op als het verplicht is (PortalSelf), met localhost-bypass.
 * - Als geo faalt: STOP + uitleg + retry
 * - BYPASS enkel op localhost (duidelijk gemarkeerd)
 */
async function requireGpsIfPortalSelf({ botui, Telemetry, isFr, cameFromPortalSelf }){
  if (!cameFromPortalSelf) return { ok:true, skipped:true };

  if (isLocalhostHost()) {
    return { ok:true, bypass:true, lat:0, lon:0, acc:0, ts:Date.now(), reason:'LOCALHOST_BYPASS' };
  }

  await botui.message.add({ content: isFr ? '📍 Localisation…' : '📍 Locatie ophalen…' });
  const geo = await getGeoFix({ timeoutMs: 8000, enableHighAccuracy: true });
  if (geo.ok) return geo;

  Telemetry?.send?.('gps_required_block_vendor', { reason: geo.reason, message: geo.message || '' });

  await botui.message.add({
    type:'html',
    content: isFr
      ? `❌ <b>Localisation GPS requise</b>.<br>Activez la localisation (GPS) et autorisez ce site.<br>Ensuite, réessayez.`
      : `❌ <b>GPS is verplicht</b>.<br>Zet je locatie (GPS) aan en geef toestemming voor deze site.<br>Probeer daarna opnieuw.`
  });

  await botui.action.button({ action: [{ text: isFr ? '🔄 Réessayer' : '🔄 Opnieuw proberen', value:'retry' }] });

  return await requireGpsIfPortalSelf({ botui, Telemetry, isFr, cameFromPortalSelf });
}


    

  /* ==================== QS & ENV ==================== */
  const host = (window.location && window.location.host) ? window.location.host : '';
  const isTest =
    qs.has('test') ||              // ?test=1 of iets anders
    qs.get('env') === 'test' ||    // ?env=test
    /test|staging/i.test(host);    // host met 'test' of 'staging'

  const envQ = isTest ? '&test=1' : '';
  if (isTest) {
    const showBanner = () => {
      const $ti = document.getElementById('test-indicator');
      if ($ti) $ti.style.display = 'block';
      document.body.classList.add('is-test');
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showBanner);
    } else {
      showBanner();
    }
  }

  /* ==================== 0. Endpoints ==================== */
  const endpointJobDetails = '/.netlify/functions/jobsvendor';
  const endpointUpdate     = endpointJobDetails;

  /* ==================== 1. Parameters ==================== */
  const jobIdRaw = qs.get('job') || qs.get('jobId') || '';
  const jobId = String(jobIdRaw).split(/[?&#]/)[0];
  let   lang  = qs.get('lang') || ((navigator.language||'').startsWith('fr') ? 'fr' : 'nl');
  const isFr  = (lang === 'fr');
  if (isFr) document.body.style.backgroundImage = "url('/afmeldentaak_fr.png')";

  /* ==================== 2. Telemetrie ==================== */
  const Telemetry = (()=>{ 
    const base = { jobId: String(jobId), lang, env: isTest ? 'test' : 'prod', cameFromPortalSelf };
    async function send(type, extra={}){
      const json = JSON.stringify({ type, ts: Date.now(), href: location.href, ...base, ...extra });
      try{
        if (navigator.sendBeacon && navigator.sendBeacon('/.netlify/functions/formlog', new Blob([json],{type:'application/json'}))) return;
        await fetch('/.netlify/functions/formlog',{ method:'POST', headers:{'content-type':'application/json'}, body: json, keepalive:true });
      }catch{}
    }
    return { send };
  })();
  Telemetry.send('vendor_html_load');

  /* ==================== 3. UI/DOM ==================== */
  const botui = new BotUI('botui-app');
  const elInfo = document.getElementById('job-info');
  document.getElementById('switch-nl').onclick = ()=>{const u=new URL(location.href);u.searchParams.set('lang','nl');location.href=u;};
  document.getElementById('switch-fr').onclick = ()=>{const u=new URL(location.href);u.searchParams.set('lang','fr');location.href=u;};

  let sessionEmail = '';
  let jobPayload   = null;
  let documentCache = {};
  let isUploading   = false;
  let hasJobDocuments = false;

  const $panel    = document.getElementById('doc-panel');
  const $backdrop = document.getElementById('doc-backdrop');
  const $fab      = document.getElementById('doc-fab');
  let fabShown = false;
  function revealFab(){
    if (fabShown) return;
    $fab.style.display = 'flex';
    $fab.removeAttribute('aria-hidden');
    $fab.removeAttribute('tabindex');
    fabShown = true;
  }
  const $close    = document.getElementById('doc-panel-close');
  const $preview  = document.getElementById('doc-preview');
  const $title    = document.getElementById('doc-panel-title');

  $fab.textContent = isFr ? '📎 Documents' : '📎 Documenten';

  function openDocPanel(){
    $panel.classList.add('open');
    $panel.setAttribute('aria-hidden','false');
    $backdrop.hidden=false; requestAnimationFrame(()=>{$backdrop.style.opacity=1});
  }
  function closeDocPanel(){
    $panel.classList.remove('open');
    $panel.setAttribute('aria-hidden','true');
    $backdrop.style.opacity=0; setTimeout(()=>{$backdrop.hidden=true},180);
  }
  $fab.addEventListener('click', async ()=>{ openDocPanel(); await loadAndRenderDocuments(jobId).catch(console.error); });
  $close.addEventListener('click', closeDocPanel);
  $backdrop.addEventListener('click', closeDocPanel);

  /* ==================== 4. Helpers ==================== */
  const stripHtml=(s='')=>s.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').replace(/\s{2,}/g,' ').trim();
  function formatIsoToLocal(iso){try{const d=new Date(iso);if(isNaN(d.getTime())) return isFr?'Date non valide':'Invalid Date'; return d.toLocaleString()}catch{ return iso||(isFr?'Date non valide':'Invalid Date') } }



  async function fetchJobDocuments(jobId){
    const url = `${endpointJobDetails}?action=LIST_JOB_DOCS&jobId=${encodeURIComponent(jobId)}${envQ}`;
    const r=await fetch(url,{headers:{accept:'application/json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    return Array.isArray(data?.Documents)?data.Documents:[];
  }

  async function fetchDocumentBase64(docId){
    const url = `${endpointJobDetails}?action=GET_JOB_DOC&docId=${encodeURIComponent(docId)}${envQ}`;
    const r=await fetch(url,{headers:{accept:'application/json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const b64 = (typeof data === 'string') ? data : (data?.Document || data?.Base64 || '');
    if(!b64 || typeof b64!=='string') throw new Error(isFr?'Données du document introuvables.':'Documentdata niet gevonden.');
    return b64;
  }

	function getMimeType(docType, description, base64Data){
	  const t = (docType || '').toUpperCase().trim();

	  if (t === 'PDF') return 'application/pdf';
	  if (t === 'JPEG' || t === 'JPG') return 'image/jpeg';
	  if (t === 'PNG') return 'image/png';
	  if (t === 'EML') return 'message/rfc822';
	  if (t === 'MSG') return 'application/vnd.ms-outlook';

	  const desc = (description || '').toLowerCase().trim();
	  if (desc.endsWith('.pdf')) return 'application/pdf';
	  if (desc.endsWith('.jpg') || desc.endsWith('.jpeg')) return 'image/jpeg';
	  if (desc.endsWith('.png')) return 'image/png';
	  if (desc.endsWith('.eml')) return 'message/rfc822';
	  if (desc.endsWith('.msg')) return 'application/vnd.ms-outlook';
	  if (desc.endsWith('.doc') || desc.endsWith('.docx')) return 'application/msword';
	  if (desc.endsWith('.xls') || desc.endsWith('.xlsx')) return 'application/vnd.ms-excel';

	  if (base64Data && base64Data.length > 16) {
		const prefix = base64Data.substring(0, 32);

		if (prefix.startsWith('/9j/')) return 'image/jpeg';
		if (prefix.startsWith('iVBORw0KGgo')) return 'image/png';
		if (prefix.startsWith('JVBERi0x')) return 'application/pdf';

		// EML bevat vaak leesbare mail headers in plain text/base64
		if (
		  prefix.startsWith('RnJvbTog') ||      // "From: "
		  prefix.startsWith('TUlNRS1WZXJzaW9uOi') || // "MIME-Version:"
		  prefix.startsWith('UmVjZWl2ZWQ6')      // "Received:"
		) {
		  return 'message/rfc822';
		}

		// MSG / Outlook OLE Compound File
		if (prefix.startsWith('0M8R4KGxGuE')) {
		  return 'application/vnd.ms-outlook';
		}
	  }

	  return 'application/octet-stream';
	}
	
	

	async function displayBase64InPanel(docId, docType, docDescription, base64Data){
	  const mimeType = getMimeType(docType, docDescription, base64Data);
	  const dataUrl = `data:${mimeType};base64,${base64Data}`;
	  const rawName = (docDescription || `${docId}.${(docType || 'bin').toLowerCase()}`);
	  const fileName = String(rawName).trim();

	  let html = '';

	  if (mimeType.startsWith('image/')) {
		html = `<figure style="margin:0">
		  <img src="${dataUrl}" alt="${docId}" style="max-width:100%;height:auto;border:1px solid #ddd;border-radius:6px"/>
		  <figcaption style="font-size:.85rem;color:#6b7280;margin-top:.25rem">${fileName}</figcaption>
		</figure>`;

	  } else if (mimeType === 'application/pdf') {
		html = `<div class="pdf-tip">Dit is een PDF. Open of download via de link hieronder.</div>
				<p><a href="${dataUrl}" target="_blank" download="${fileName.endsWith('.pdf') ? fileName : fileName + '.pdf'}" style="display:inline-block;padding:8px 14px;background:#EE7E00;color:#fff;text-decoration:none;border-radius:6px;font-weight:700">PDF openen/downloaden</a></p>`;

	  } else if (mimeType === 'message/rfc822') {
		html = `<div class="pdf-tip">Dit is een e-mailbestand (.eml). Je browser previewt dit meestal niet rechtstreeks.</div>
				<p><a href="${dataUrl}" target="_blank" download="${fileName.endsWith('.eml') ? fileName : fileName + '.eml'}" style="display:inline-block;padding:8px 14px;background:#EE7E00;color:#fff;text-decoration:none;border-radius:6px;font-weight:700">EML downloaden</a></p>`;

	  } else if (mimeType === 'application/vnd.ms-outlook') {
		html = `<div class="pdf-tip">Dit is een Outlook-mailbestand (.msg). Je browser previewt dit meestal niet rechtstreeks.</div>
				<p><a href="${dataUrl}" target="_blank" download="${fileName.endsWith('.msg') ? fileName : fileName + '.msg'}" style="display:inline-block;padding:8px 14px;background:#EE7E00;color:#fff;text-decoration:none;border-radius:6px;font-weight:700">MSG downloaden</a></p>`;

	  } else {
		html = `<p style="color:#b91c1c">Niet-ondersteund type (${mimeType}).</p>
				<p><a href="${dataUrl}" target="_blank" download="${fileName}" style="color:#EE7E00;font-weight:700">Origineel downloaden</a></p>`;
	  }

	  $preview.innerHTML = html;
	}
  

  

  /* ==================== 5. Login ==================== */
	function getVendorSessionEmail({ maxAgeMin = 120 } = {}) {
	  try {
		const email = (sessionStorage.getItem('vendor_session_email') || '').trim().toLowerCase();
		const ts = parseInt(sessionStorage.getItem('vendor_session_ts') || '0', 10);
		if (!email) return '';
		if (!ts || !Number.isFinite(ts)) return '';

		const ageMin = (Date.now() - ts) / 60000;
		if (ageMin > maxAgeMin) return '';
		return email;
	  } catch {
		return '';
	  }
	}

		if (!email) {

			  : `${t.invalid} Je hebt nog ${remaining} poging(en) over.`
		  });

		  await fetchJobDetails();



		  Telemetry.send('email_ok', {
			emailMasked: email.replace(/(.).+(@.*)/, '$1***$2')

		  try {

			  : `${t.invalid} Je hebt nog ${remaining} poging(en) over.`

	function getProgressStatusId(job) {
	  return String(
		job?.ProgressStatusId ||
		job?.ProgressStatus?.Id ||
		job?.Status ||
		''
	  ).trim();
	}

	function isJobOpen(job){ 
	  const ps = getProgressStatusId(job);

	  // 1016 blijft toegestaan, want dat is het startpunt voor acceptatie.
	  const blockedProgressStatuses = ['1017', '1018', '1020', '1024', '1027', '1010', '1030'];

	  if (!ps) return true;
	  return !blockedProgressStatuses.includes(ps);
	}

  async function translateText(text, from, to){
    if(!text||from===to) return {text, detected:null};
    try{ 
      const r=await fetch('/.netlify/functions/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,source:from||undefined,target:to})}); 
      if(!r.ok) throw new Error(await r.text()); 
      const data=await r.json(); 
      return { text:data?.text??text, detected:data?.detected??null } 
    }catch{ return { text, detected:null } } 
  }

  async function loadAndRenderDocuments(jobId){

    $preview.innerHTML = `<div class="pdf-tip">Selecteer een document uit de lijst om de preview te zien. PDF's openen in een nieuw tabblad of via downloadlink.</div>`;

    let $newList = $oldList;
    if ($oldList && $oldList.parentNode) {
      $newList = $oldList.cloneNode(false);
      $newList.id = $oldList.id; 
      $oldList.parentNode.replaceChild($newList, $oldList);
    }

    documentCache = {}; 
    
    try{
      const allDocs = await fetchJobDocuments(jobId);
      const docs = allDocs;

      if(!docs.length){ $newList.innerHTML=`<div style='padding:.75rem'>${isFr?'Aucun document lié à cette tâche.':'Geen documenten gekoppeld aan deze taak.'}</div>`; return }

      const rows = docs.map(d=>{
        const id  = d.Id || '';
        const typ = d.DocumentType || ''; 
        const rawDesc = stripHtml(d.Description||'');
        let decodedDesc = rawDesc;
        try { decodedDesc = decodeURIComponent(rawDesc); } catch { decodedDesc = rawDesc; }
        documentCache[id] = { id, type: typ, desc: decodedDesc };
        return `<tr>
          <td>${decodedDesc}</td> 
          <td style='width:1%;white-space:nowrap'>
            <button class='view-doc-btn' data-docid='${id}'>${isFr?'Voir':'Bekijken'}</button>
          </td>
        </tr>`;
      }).join('');

      $newList.innerHTML = `<div style='overflow:auto'>
        <table class='doc-table'>
          <thead>
            <tr>
              <th>${isFr?'Description':'Omschrijving'}</th>
              <th>${isFr?'Actie':'Actie'}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
      
      $newList.addEventListener('click', async (ev)=>{
        const btn = ev.target.closest('button.view-doc-btn'); if(!btn) return;
        const docIdFromDom = btn.dataset.docid;
        const docData = documentCache[docIdFromDom];
        if (!docData) { 
          await botui.message.add({ content: isFr?'❌ Données du document introuvables.':'❌ Documentgegevens niet gevonden.' });
          return;
        }
        btn.disabled=true; const old=btn.textContent; btn.textContent=isFr?'Chargement…':'Laden…';
        try{
          const b64 = await fetchDocumentBase64(docData.id);
          await displayBase64InPanel(docData.id, docData.type, docData.desc, b64);
        }catch(e){
          await botui.message.add({ content: isFr?`❌ Erreur de chargement du contenu: ${e.message}`:`❌ Fout bij laden inhoud: ${e.message}` });
        }finally{
          btn.disabled=false; btn.textContent=old;
        }
      });
    }catch(e){
      console.error(e);
      $newList.innerHTML = `<div style='padding:.75rem;color:#b91c1c'>${isFr?'Échec du chargement des documents.':'Documenten laden mislukt.'} (${e.message})</div>`;
    }
  }

  // Bouw GPS-string die je in voortgang/status wil meesturen (als portalself bron)
  async function buildPortalSelfGpsStamp(){
    if (!cameFromPortalSelf) return '';
    const geo = await getGeoFix({ timeoutMs: 8000, enableHighAccuracy: true });

    // We stoppen hier NIET de flow: in vendor is dit enkel extra bewijs in voortgang.
    // (Portalself zelf blokkeert al op GPS; vendor is "status/voortgang".)
    if (!geo.ok) {
      Telemetry.send('vendor_gps_unavailable', { reason: geo.reason, message: geo.message || '' });
      return `\nPortalSelf GPS: unavailable (${geo.reason}${geo.message ? `: ${geo.message}` : ''})`;
    }

    Telemetry.send('vendor_gps_ok', { acc: geo.acc });
    return `\nPortalSelf GPS: lat=${geo.lat}; lon=${geo.lon}; acc=${geo.acc}m; ts=${new Date(geo.ts).toISOString()}`;
  }

async function askSignaturePad() {
  return new Promise(async (resolve) => {
    const id = `sig-${Date.now()}`;

    await botui.message.add({
      type: 'html',
      content: `
        <div style="border:2px solid #EE7E00;border-radius:8px;padding:10px;background:#fff;width:100%;box-sizing:border-box">
          <canvas id="${id}"
            style="width:100%;height:180px;border:1px solid #ccc;border-radius:6px;touch-action:none;background:#fff;display:block;box-sizing:border-box"></canvas>
          <div style="margin-top:8px">
            <button type="button" id="${id}-clear">Wissen</button>
            <button type="button" id="${id}-ok">Bevestigen</button>
          </div>
        </div>
      `
    });

    const canvas = document.getElementById(id);
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;

    const ctx = canvas.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false;
    let hasDrawn = false;

    function pos(e) {
      const r = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - r.left, y: p.clientY - r.top };
    }

    function start(e) {
      e.preventDefault();
      drawing = true;
      hasDrawn = true;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = pos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function end() {
      drawing = false;
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);

    document.getElementById(`${id}-clear`).onclick = () => {
      ctx.clearRect(0, 0, rect.width, rect.height);
      hasDrawn = false;
    };

    document.getElementById(`${id}-ok`).onclick = async () => {
      if (!hasDrawn) {
        await botui.message.add({
          content: isFr ? '⚠️ Signature obligatoire.' : '⚠️ Handtekening is verplicht.'
        });
        return;
      }

      resolve(canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, ''));
    };
  });
}

	async function menu(job, opts = {}) {
	  const ps = getProgressStatusId(job);

	  const needsAcceptance =
		job.CustomerNeedsAcceptance === true ||
		String(job.CustomerNeedsAcceptance || '').toLowerCase() === 'true';

	  const showAcceptanceButton = ps === '1016' && needsAcceptance;

	  const doneText = showAcceptanceButton
		? (isFr ? '✅ À accepter' : '✅ Ter acceptatie')
		: (isFr ? '✅ Terminer la tâche' : '✅ Taak uitgevoerd');

	  if (!opts.silent) {
		await botui.message.add({
		  content: isFr
			? `Que voulez-vous faire pour la tâche ${job.Id}?`
			: `Wat wil je doen voor taak ${job.Id}?`
		});
	  }

	  const ans = await botui.action.button({
		action: [
		  { text: isFr ? '➕ Ajouter un commentaire' : '➕ Info toevoegen', value: 'info' },
		  { text: doneText, value: 'done' },
		  { text: isFr ? '🛑 Quitter la session' : '🛑 Sessie verlaten', value: 'exit', cssClass: 'secondary-button' }
		]
	  });

	  if (ans.value === 'info') {
		const ok = await runCommentWithOptionalPhoto(job, { action: 'ADD_INFO' });
		if (ok) {
		  const jobPayload = await fetchJobDetails();
		  return menu(jobPayload.Job, { silent: true });
		}
		return;
	  }

	  if (ans.value === 'done') {
		// Alleen bij 1016 + acceptatie vereist: acceptatieprocedure starten.
		if (showAcceptanceButton) {
		  return await runAcceptanceSignature(job);
		}

		// Bij 1008 of andere uitvoerbare status: eerst normale CLOSE-flow naar 1016.
		const ok = await runCommentWithOptionalPhoto(job, { action: 'CLOSE' });
		if (!ok) return;

		const refreshed = await fetchJobDetails();
		const newJob = refreshed.Job || {};
		const newPs = getProgressStatusId(newJob);

		const newNeedsAcceptance =
		  newJob.CustomerNeedsAcceptance === true ||
		  String(newJob.CustomerNeedsAcceptance || '').toLowerCase() === 'true';

		// Na CLOSE niet automatisch acceptatie starten; opnieuw menu tonen met correcte knop.
		if (newPs === '1016' && newNeedsAcceptance) {
		  return menu(newJob, { silent: true });
		}

		await botui.message.add({
		  content: isFr
			? '✅ Tâche clôturée. Retour au portail…'
			: '✅ Taak afgerond. Terug naar portal…'
		});

		closeDocPanel();
		if (cameFromPortalSelf) return goBackAfterVendor();
		return;
	  }

	  if (ans.value === 'exit') {
		Telemetry.send('session_exit', { cameFromPortalSelf });

		if (cameFromPortalSelf) {
		  await botui.message.add({
			content: isFr
			  ? '🔚 Session terminée. Retour au portail…'
			  : '🔚 Sessie beëindigd. Terug naar portal…'
		  });
		  return goBackAfterVendor();
		}

		await botui.message.add({
		  content: isFr
			? '🔚 Merci. Vous pouvez fermer cette fenêtre.'
			: '🔚 Bedankt. Je kunt dit venster sluiten.'
		});
	  }
	}

  /* ==================== 11. Upload helpers ==================== */
  function sanitizeName(name){ return String(name||'').replace(/[^\w.\-()+ ]+/g,'_').trim() || 'upload.bin'; }
  
function guessMimeByName(name){
  const n = String(name || '').toLowerCase();
  if (n.endsWith('.jpg') || n.endsWith('.jpeg')) return 'image/jpeg';
  if (n.endsWith('.png')) return 'image/png';
  if (n.endsWith('.pdf')) return 'application/pdf';
  if (n.endsWith('.eml')) return 'message/rfc822';
  if (n.endsWith('.msg')) return 'application/vnd.ms-outlook';
  return 'application/octet-stream';
}

  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>{
        const s=String(r.result||''); const i=s.indexOf('base64,');
        res(i>0 ? s.substring(i+7) : s);
      };
      r.onerror=()=>rej(r.error||new Error('Kon bestand niet lezen'));
      r.readAsDataURL(file);
    });
  }

  async function uploadJobDocument({ file, email, jobId, descriptionOverride }) {
    if (!jobId) throw new Error('JobId ontbreekt.');
    const MAX_MB = 7;
    if (file.size > MAX_MB * 1024 * 1024) {
      throw new Error(`Bestand is groter dan ${MAX_MB} MB.`);
    }

    const originalName = sanitizeName(file.name);
    const finalName    = originalName;
    const mime         = file.type || guessMimeByName(originalName);
    const b64          = await fileToBase64(file);

    const rawDescription = (descriptionOverride || originalName);
    const cleanDesc      = stripHtml(String(rawDescription)).slice(0, 200);

    const url = `${endpointJobDetails}?action=ADD_JOB_DOC&jobId=${encodeURIComponent(jobId)}${envQ}`;

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'content-type':'application/json', 'accept':'application/json' },
      body: JSON.stringify({
        action: 'ADD_JOB_DOC',
        jobId: String(jobId),
        email: String(email || ''),
        fileName: finalName,
        mimeType: mime,
        description: cleanDesc,
        base64: b64
      })
    });

    const txt = await resp.text().catch(()=> '');
    let json = {};
    try { json = JSON.parse(txt); } catch { json = { raw: txt }; }

    if (!resp.ok) {
      const reason = json?.error || json?.message || txt || `HTTP ${resp.status}`;
      throw new Error(`Upload mislukt: ${reason}`);
    }
    return json;
  }

	async function startFlow(){
	  try{
		if(!jobId){
		  await botui.message.add({ type:'html', content:'<span style="color:red;font-weight:bold">Geen geldige Job ID.</span>' });
		  Telemetry.send('invalid_job_id');
		  return;
		}

		const loginSuccess = await emailIntroAndLogin();
		if(!loginSuccess) return;

		await botui.message.add({ content: isFr ? 'Je récupère les détails de la tâche…' : 'Ik haal de taakdetails op…' });

		jobPayload = await fetchJobDetails();
		

		
		
		const job = jobPayload?.Job || {};

		
		if (!job.Id) throw new Error('Job details ontvangen, maar taak-ID ontbreekt in de payload.');

		// ✅ KWISID check (na login) -> sessie bewaren -> meteen door naar issues
		const kwisId = String(job.KwisId ?? job.KWISID ?? job.kwisId ?? '').trim();
		if (kwisId === '002') {
		  try {
			sessionStorage.setItem('vendor_session_email', String(sessionEmail || ''));
			sessionStorage.setItem('vendor_session_ts', String(Date.now()));
		  } catch {}

		  Telemetry.send('redirect_vendor_issues_kwisid_002', { kwisId });
		  redirectToVendorIssuesSameExt();
		  return;
		}

		try {
		  const docs = await fetchJobDocuments(job.Id);
		  hasJobDocuments = docs.length > 0;
		} catch (e) {
		  console.warn('Kon documenten niet vooraf controleren:', e.message);
		  hasJobDocuments = false;
		}

		await showJobTextsThenAskTranslate(job);

		if(!isJobOpen(job)){
		  await botui.message.add({ content:isFr?'Cette tâche est déjà clôturée. Aucune action possible.':'Deze taak is al afgesloten. Geen acties meer mogelijk.' });
		  Telemetry.send('job_closed', { status: job.Status });
		  return;
		}

		await menu(job);
	  }catch(e){
		const errorDetail = String(e.message || e);
		console.error('FATALE FOUT IN FLOW:', e);

		let userMessage = isFr
		  ? '❌ Erreur: Une erreur inattendue est survenue. Veuillez réessayer plus tard.'
		  : '❌ Fout: Er is een onverwachte fout opgetreden. Probeer later opnieuw.';

		if(errorDetail.includes('HTTP')) {
		  userMessage = isFr
			? `❌ Erreur de connexion: Le chargement a échoué (Détail: ${errorDetail}).`
			: `❌ Verbindingsfout: Laden is onderbroken (Détail: ${errorDetail}).`;
		}

		await botui.message.add({ content:userMessage, type:'html', cssClass:'error-message' });
		Telemetry.send('fatal_error', { err: errorDetail });
	  }
	}


  // Idle ping
  let lastActivity=Date.now(); ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>lastActivity=Date.now(),{passive:true}));
  setInterval(()=>{ const ms=Date.now()-lastActivity; if(ms>45000){ Telemetry.send('idle',{inactiveMs:ms}); lastActivity=Date.now() } },5000);
  addEventListener('pagehide',()=>Telemetry.send('pagehide'));

  startFlow();
  </script>
